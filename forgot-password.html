<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>poist.ie — Reset Password</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--teal:#1A6B3C;--teal-dark:#0D3B2E;--teal-mid:#2D8653;--gold:#F5C518;--navy:#0F1A13;--gray:#6B7F72;--border:#E5E7EB;
  --forest:#0D3B2E;--green:#1A6B3C;--green2:#2D8653;--gold2:#C9921A;--ink:#0F1A13;--body:#2E3C34;
  --muted:#6B7F72;--gray-faint:#C4D4CB;--white:#FFFFFF;--off:#F5F7F5;--radius:14px;--mono:'JetBrains Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;color:var(--navy);background:linear-gradient(135deg,var(--teal-dark) 0%,var(--teal) 60%,var(--teal-mid) 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.card{background:#fff;border-radius:24px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.2);}
.form-input{width:100%;padding:.7rem 1rem;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;font-family:'DM Sans',sans-serif;outline:none;box-sizing:border-box;transition:border-color .18s;}
.form-input:focus{border-color:var(--teal);}
.btn{width:100%;background:var(--teal);color:#fff;padding:.85rem;border-radius:10px;font-weight:700;font-size:.95rem;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .2s;}
.btn:hover{background:var(--teal-dark);}
.btn:disabled{background:#9CA3AF;cursor:not-allowed;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeIn .35s ease both;}
</style>
</head>
<body>
<div class="card fade-in">
  <div style="text-align:center;margin-bottom:1.8rem;">
    <a href="index.html" style="text-decoration:none;font-family:'Syne',sans-serif;font-weight:800;font-size:1.8rem;letter-spacing:-.03em;background:linear-gradient(90deg,#0D3B2E,#2D8653);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">poist.ie</a>
  </div>

  <!-- Step 1: enter email -->
  <div id="step1">
    <h1 style="font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:.3rem;">Reset your password</h1>
    <p style="color:var(--gray);font-size:.9rem;margin-bottom:1.5rem;line-height:1.6;">Enter your email and we'll send you a reset link.</p>
    <div style="margin-bottom:1rem;">
      <label style="font-size:.85rem;font-weight:600;display:block;margin-bottom:.4rem;">Email address</label>
      <input type="email" id="email" class="form-input" placeholder="you@example.ie">
    </div>
    <div id="errMsg" style="display:none;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;padding:.6rem .9rem;border-radius:8px;font-size:.85rem;margin-bottom:1rem;"></div>
    <button class="btn" id="sendBtn" onclick="sendReset()" style="margin-bottom:1rem;">Send Reset Link →</button>
    <div style="text-align:center;font-size:.85rem;color:var(--gray);">
      <a href="login.html" style="color:var(--teal);font-weight:600;text-decoration:none;">← Back to sign in</a>
    </div>
  </div>

  <!-- Step 2: email sent confirmation -->
  <div id="step2" style="display:none;text-align:center;">
    <div style="font-size:3rem;margin-bottom:1rem;">📧</div>
    <h2 style="font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;margin-bottom:.5rem;">Check your email</h2>
    <p style="color:var(--gray);font-size:.9rem;line-height:1.7;margin-bottom:1.5rem;">We've sent a password reset link to <strong id="sentTo"></strong>. It will expire in 1 hour.</p>
    <p style="color:var(--gray);font-size:.82rem;margin-bottom:1.5rem;">Didn't receive it? Check your spam folder, or <button onclick="document.getElementById('step1').style.display='block';document.getElementById('step2').style.display='none';" style="background:none;border:none;color:var(--teal);font-weight:600;cursor:pointer;font-size:.82rem;">try again</button>.</p>
    <a href="login.html" style="color:var(--teal);font-weight:600;text-decoration:none;font-size:.9rem;">← Back to sign in</a>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient(
  'https://kpfshjarepmazrgzffot.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZnNoamFyZXBtYXpyZ3pmZm90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzQ0MjIsImV4cCI6MjA5MDY1MDQyMn0.yU-6ASii1duNXgGMs0ZWTkgTYXonVfqVOnEQr0J8FhU'
);

window.sendReset = async () => {
  const email = document.getElementById('email').value.trim();
  const err = document.getElementById('errMsg');
  const btn = document.getElementById('sendBtn');
  err.style.display = 'none';

  if (!email) {
    err.textContent = 'Please enter your email address.';
    err.style.display = 'block';
    return;
  }

  btn.textContent = 'Sending…'; btn.disabled = true;

  // ✅ redirectTo now points to update-password.html, not login.html
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://poist.vercel.app/update-password.html'
  });

  btn.textContent = 'Send Reset Link →'; btn.disabled = false;

  if (error) {
    err.textContent = error.message;
    err.style.display = 'block';
    return;
  }

  document.getElementById('sentTo').textContent = email;
  document.getElementById('step1').style.display = 'none';
  document.getElementById('step2').style.display = 'block';
};

// Allow Enter key to submit
document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.sendReset();
});
</script>
</body>
</html>
