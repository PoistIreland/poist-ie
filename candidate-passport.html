<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>poist.ie — Language Passport</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#1A7A6E;--teal-dark:#0f5a51;--teal-light:#E8F5F3;--teal-mid:#2a9d8f;
  --gold:#F5C518;--gold-dark:#d4a800;
  --dark:#1A1A2E;--gray:#6B7280;--cream:#F5F2ED;--border:#E5E7EB;--white:#ffffff;
  --red:#dc2626;--green:#16a34a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#F5F2ED;color:var(--dark);overflow-x:hidden;}
input,select,textarea{font-family:'DM Sans',sans-serif;}
.app-shell{display:flex;min-height:100vh;}
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.page-content{flex:1;overflow-y:auto;padding:1.5rem;}
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.4rem;}
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.6rem 1.2rem;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;border:none;transition:all 0.18s;text-decoration:none;}
.btn-primary{background:var(--gold);color:var(--dark);}
.btn-primary:hover{background:var(--gold-dark);transform:translateY(-1px);}
.btn-teal{background:var(--teal);color:#fff;}
.btn-teal:hover{background:var(--teal-dark);}
.btn-outline{background:transparent;border:1.5px solid var(--teal);color:var(--teal);}
.btn-outline:hover{background:var(--teal-light);}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--gray);}
.btn-ghost:hover{border-color:var(--dark);color:var(--dark);}
.btn-lg{padding:0.8rem 1.8rem;font-size:1rem;border-radius:10px;}
.form-group{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem;}
.form-label{font-size:0.85rem;font-weight:600;color:var(--dark);}
.form-input{padding:0.65rem 0.9rem;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;color:var(--dark);background:var(--white);transition:border-color 0.18s;outline:none;width:100%;}
.form-input:focus{border-color:var(--teal);}
.form-hint{font-size:0.78rem;color:var(--gray);}
select.form-input{cursor:pointer;}
.badge-green{background:#dcfce7;color:var(--green);}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.section-hdr h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;}
.verified{display:inline-flex;align-items:center;gap:0.3rem;background:#E8F5F3;color:var(--teal);font-size:0.72rem;font-weight:600;padding:0.18rem 0.55rem;border-radius:4px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.fade-in{animation:fadeIn 0.3s ease both;}
/* Loading */
#loadingScreen{position:fixed;inset:0;background:var(--cream);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:1rem;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* Passport-specific */
.cefr-option{border:1.5px solid var(--border);border-radius:8px;padding:.6rem;cursor:pointer;font-weight:700;font-size:.9rem;color:var(--gray);transition:all .15s;text-align:center;background:var(--white);}
.cefr-option.sel{border-color:var(--teal);background:var(--teal-light);color:var(--teal);}
.cefr-option:hover{border-color:var(--teal-mid);}
.skill-chip{background:var(--teal-light);color:var(--teal);padding:.28rem .65rem;border-radius:6px;font-size:.8rem;font-weight:600;display:inline-flex;align-items:center;gap:.3rem;}
.skill-chip button{background:none;border:none;cursor:pointer;color:var(--teal);font-size:.95rem;padding:0;line-height:1;}
.progress-bar{height:7px;background:var(--border);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal-mid));border-radius:4px;transition:width .4s ease;}
.cefr-scale{display:flex;gap:3px;}
.cefr-pip{flex:1;height:6px;border-radius:3px;background:#E5E7EB;}
.cefr-pip.on{background:var(--gold);}
/* Upload zone */
.upload-zone{border:2px dashed var(--border);border-radius:10px;padding:1.2rem;text-align:center;cursor:pointer;transition:all .2s;}
.upload-zone:hover,.upload-zone.drag{border-color:var(--teal);background:var(--teal-light);}
.upload-zone input[type=file]{display:none;}
@media(max-width:768px){.two-col{grid-template-columns:1fr!important;}}
</style>
</head>
<body>

<div id="loadingScreen">
  <div class="spinner"></div>
  <div style="font-size:0.88rem;color:var(--gray);">Loading your passport…</div>
</div>

<div class="app-shell" id="shell" style="display:none;"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL      = 'https://kpfshjarepmazrgzffot.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZnNoamFyZXBtYXpyZ3pmZm90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDM1OTkwMzMsImV4cCI6MjA1OTE3NTAzM30.6nMCmXFzKGJMOliGBMMO3MBoQYPTVBjCkN17xLc7tko';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const LEVELS   = ['A1','A2','B1','B2','C1','C2'];
const COUNTIES = ['Antrim','Armagh','Carlow','Cavan','Clare','Cork','Derry','Donegal','Down','Dublin','Fermanagh','Galway','Kerry','Kildare','Kilkenny','Laois','Leitrim','Limerick','Longford','Louth','Mayo','Meath','Monaghan','Offaly','Roscommon','Sligo','Tipperary','Tyrone','Waterford','Westmeath','Wexford','Wicklow'];

// ── Mutable state (populated from Supabase) ───────────────────────────────────
let userId    = null;
let passport  = {
  full_name:       '',
  email:           '',
  county:          '',
  cefr_level:      'B1',
  profile_type:    'active',
  bio:             '',
  skills:          [],
  available_from:  '',
  speaking_clip_url: null,
};

// ── Helpers ───────────────────────────────────────────────────────────────────

function toast(msg, type = 'success') {
  const t = document.createElement('div');
  const bg = type === 'success' ? '#1A7A6E' : type === 'error' ? '#dc2626' : '#1A1A2E';
  t.style.cssText = `position:fixed;bottom:1.5rem;right:1.5rem;background:${bg};color:#fff;padding:0.8rem 1.3rem;border-radius:10px;font-size:0.9rem;font-weight:500;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.2);animation:slideIn 0.3s ease;`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function logout() {
  supabase.auth.signOut().then(() => { window.location.href = 'login.html'; });
}

function calcPct() {
  let s = 0;
  if (passport.cefr_level)          s += 25;
  if (passport.bio?.trim())          s += 20;
  if ((passport.skills||[]).length >= 2) s += 20;
  if (passport.county)               s += 15;
  if (passport.profile_type)         s += 10;
  if (passport.speaking_clip_url)    s += 10;
  return Math.min(s, 100);
}

function cefrIndex(l) { return LEVELS.indexOf(l); }

function renderPassportCard() {
  const pct   = calcPct();
  const irish = passport.cefr_level || 'B1';
  const skills = (passport.skills || []);
  return `
    <div class="card" style="background:linear-gradient(145deg,var(--teal-dark),var(--teal));color:#fff;border:none;">
      <div style="display:flex;align-items:center;gap:.8rem;margin-bottom:1.2rem;">
        <div style="width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;">👤</div>
        <div>
          <div style="font-family:'Syne',sans-serif;font-weight:700;">${passport.full_name || 'Your Name'}</div>
          <div id="pvSub" style="font-size:.78rem;opacity:.7;">${passport.profile_type === 'active' ? 'Actively looking' : 'Open to offers'} · ${passport.county || 'County'}</div>
        </div>
      </div>
      <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;opacity:.55;margin-bottom:.4rem;">Language Passport · poist.ie</div>

      <!-- Irish CEFR -->
      <div style="background:rgba(255,255,255,.13);border-radius:7px;padding:.75rem 1rem;margin-bottom:.7rem;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;font-size:.83rem;font-weight:600;">
          Irish (Gaeilge)
          <span id="pvIrishBadge" style="background:var(--gold);color:var(--dark);padding:.12rem .45rem;border-radius:4px;font-size:.7rem;font-weight:700;">${irish}</span>
        </div>
        <div class="cefr-scale" id="pvIrishScale">
          ${LEVELS.map(l => `<div class="cefr-pip ${cefrIndex(l) <= cefrIndex(irish) ? 'on' : ''}"></div>`).join('')}
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:.3rem;">
          ${LEVELS.map(l => `<span style="font-size:.6rem;opacity:.55;">${l}</span>`).join('')}
        </div>
      </div>

      <!-- Skills preview -->
      <div id="pvSkills" style="display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.8rem;">
        ${skills.length ? skills.map(s => `<span style="background:rgba(255,255,255,.15);border-radius:5px;padding:.2rem .5rem;font-size:.7rem;">${s}</span>`).join('') : '<span style="font-size:.75rem;opacity:.5;">Add skills below</span>'}
      </div>

      <!-- Speaking clip indicator -->
      <div id="pvAudio" style="margin-bottom:.8rem;"></div>

      <!-- Verified badge -->
      <div style="display:inline-flex;align-items:center;gap:.3rem;background:rgba(245,197,24,.2);border:1px solid rgba(245,197,24,.35);color:var(--gold);padding:.25rem .6rem;border-radius:100px;font-size:.68rem;font-weight:600;">
        ✓ Official Irish Candidate Verified
      </div>

      <!-- Completion bar -->
      <div style="margin-top:1rem;">
        <div style="display:flex;justify-content:space-between;font-size:.72rem;opacity:.7;margin-bottom:.3rem;">
          <span>Passport completion</span>
          <span id="pvPct">${pct}%</span>
        </div>
        <div style="height:5px;background:rgba(255,255,255,.2);border-radius:3px;">
          <div id="pvPctBar" style="height:100%;width:${pct}%;background:var(--gold);border-radius:3px;transition:width .4s;"></div>
        </div>
      </div>
    </div>`;
}

function renderSidebar() {
  return `
    <aside style="width:220px;min-height:100vh;background:#0f5a51;display:flex;flex-direction:column;flex-shrink:0;">
      <div style="padding:1.4rem 1.2rem 1rem;border-bottom:1px solid rgba(255,255,255,0.1);">
        <a href="index.html" style="text-decoration:none;font-family:'DM Sans',sans-serif;font-weight:700;font-size:1.65rem;letter-spacing:-0.03em;background:linear-gradient(90deg,rgba(255,255,255,0.9),rgba(255,255,255,0.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">poist.ie</a>
      </div>
      <nav style="padding:0.8rem 0;flex:1;">
        ${[
          { href:'candidate-dashboard.html', icon:'⊞', label:'Dashboard' },
          { href:'candidate-jobs.html',      icon:'🔍', label:'Find Jobs' },
          { href:'candidate-passport.html',  icon:'📋', label:'My Passport', active:true },
        ].map(l => `
          <a href="${l.href}" style="display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.2rem;text-decoration:none;font-size:0.92rem;font-weight:500;transition:background 0.15s;${l.active ? 'background:rgba(255,255,255,0.15);color:#fff;' : 'color:rgba(255,255,255,0.7);'}"
             onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='${l.active ? 'rgba(255,255,255,0.15)' : 'transparent'}'">
            <span style="font-size:1rem;width:20px;text-align:center;">${l.icon}</span>${l.label}
          </a>`).join('')}
      </nav>
      <div style="padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,0.1);">
        <button onclick="window._poistLogout()" style="background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.7);padding:0.5rem 1rem;border-radius:6px;cursor:pointer;font-size:0.85rem;width:100%;text-align:left;">← Sign out</button>
      </div>
    </aside>`;
}

function renderTopBar(name) {
  return `
    <div style="height:60px;background:#fff;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;flex-shrink:0;">
      <h1 style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:#1A1A2E;">My Language Passport</h1>
      <div style="display:flex;align-items:center;gap:0.8rem;">
        <div style="width:32px;height:32px;border-radius:50%;background:#E8F5F3;display:flex;align-items:center;justify-content:center;font-size:1.1rem;">👤</div>
        <span style="font-size:0.88rem;font-weight:500;color:#374151;">${name || 'Candidate'}</span>
      </div>
    </div>`;
}

// ── Render the full page into #shell ─────────────────────────────────────────

function renderPage() {
  document.getElementById('shell').innerHTML = `
    ${renderSidebar()}
    <div class="main-area">
      ${renderTopBar(passport.full_name)}
      <div class="page-content fade-in">
        <div style="max-width:900px;margin:0 auto;">

          <!-- Completion bar -->
          <div class="card" style="margin-bottom:1.2rem;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;">
              <span style="font-weight:600;font-size:.9rem;">Passport completion</span>
              <span id="pctLbl" style="font-family:'Syne',sans-serif;font-weight:800;color:var(--teal);">${calcPct()}%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:${calcPct()}%"></div></div>
            <p style="font-size:.82rem;color:var(--gray);margin-top:.5rem;">A complete passport gets 3× more employer views. Add a speaking clip to reach 100%.</p>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;" class="two-col">

            <!-- LEFT: Passport preview card (live updates) -->
            <div id="passportPreview">
              ${renderPassportCard()}
            </div>

            <!-- RIGHT: Edit forms -->
            <div style="display:flex;flex-direction:column;gap:.9rem;">

              <!-- Irish CEFR -->
              <div class="card">
                <h3 style="font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:.9rem;">Irish proficiency (Gaeilge)</h3>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;" id="irishGrid">
                  ${LEVELS.map(l => `<button class="cefr-option ${passport.cefr_level === l ? 'sel' : ''}" onclick="window._setCefr('${l}')">${l}</button>`).join('')}
                </div>
                <p class="form-hint" style="margin-top:.5rem;">Select your honest current level — employers filter by this.</p>
              </div>

              <!-- Profile type -->
              <div class="card">
                <h3 style="font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:.8rem;">Availability</h3>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem;">
                  <button class="cefr-option ${passport.profile_type === 'active' ? 'sel' : ''}" onclick="window._setType('active')">🔍 Actively looking</button>
                  <button class="cefr-option ${passport.profile_type === 'passive' ? 'sel' : ''}" onclick="window._setType('passive')">📬 Open to offers</button>
                </div>
                <div class="form-group" style="margin-top:.8rem;margin-bottom:0;">
                  <label class="form-label">Available from</label>
                  <input type="date" id="availFrom" class="form-input" value="${passport.available_from || ''}" oninput="window._setField('available_from', this.value)">
                </div>
              </div>

              <!-- Skills -->
              <div class="card">
                <h3 style="font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:.8rem;">Skills</h3>
                <div id="skillsDisplay" style="display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.8rem;">
                  ${(passport.skills || []).map((s, i) => `<span class="skill-chip">${s}<button onclick="window._removeSkill(${i})">×</button></span>`).join('') || '<span style="font-size:.82rem;color:var(--gray);">No skills added yet</span>'}
                </div>
                <div style="display:flex;gap:.5rem;">
                  <input type="text" id="skillInput" class="form-input" placeholder="Add a skill…" style="flex:1;" onkeydown="if(event.key==='Enter'){window._addSkill();}">
                  <button class="btn btn-teal" onclick="window._addSkill()">Add</button>
                </div>
                <p class="form-hint" style="margin-top:.4rem;">e.g. Public Speaking, Teaching, Policy, Content Writing</p>
              </div>

              <!-- Profile details -->
              <div class="card">
                <h3 style="font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:.8rem;">Profile details</h3>
                <div class="form-group">
                  <label class="form-label">Full name</label>
                  <input type="text" id="fullName" class="form-input" value="${passport.full_name || ''}" oninput="window._setField('full_name', this.value)">
                </div>
                <div class="form-group">
                  <label class="form-label">County</label>
                  <select id="countysel" class="form-input" onchange="window._setField('county', this.value)">
                    <option value="">Select county…</option>
                    ${COUNTIES.map(c => `<option value="${c}" ${passport.county === c ? 'selected' : ''}>${c}</option>`).join('')}
                  </select>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                  <label class="form-label">Short bio</label>
                  <textarea id="bio" class="form-input" rows="3" placeholder="A sentence or two about your background and what you're looking for…" oninput="window._setField('bio', this.value)">${passport.bio || ''}</textarea>
                </div>
              </div>

              <!-- Speaking clip upload -->
              <div class="card">
                <h3 style="font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:.3rem;">🎤 Speaking clip</h3>
                <p class="form-hint" style="margin-bottom:.9rem;">Upload a 30–60 second audio clip in Irish. Employers can listen before contacting you. MP3 or M4A, max 10MB.</p>
                <div id="clipStatus">${renderClipStatus()}</div>
                <div class="upload-zone" id="uploadZone" onclick="document.getElementById('clipFileInput').click()" ondragover="event.preventDefault();this.classList.add('drag')" ondragleave="this.classList.remove('drag')" ondrop="event.preventDefault();this.classList.remove('drag');window._handleClipDrop(event)">
                  <input type="file" id="clipFileInput" accept="audio/mp3,audio/mpeg,audio/m4a,audio/mp4,audio/*" onchange="window._uploadClip(this.files[0])">
                  <div style="font-size:1.5rem;margin-bottom:.4rem;">🎙️</div>
                  <div style="font-weight:600;font-size:.88rem;margin-bottom:.2rem;">Click to upload or drag & drop</div>
                  <div style="font-size:.78rem;color:var(--gray);">MP3 / M4A · max 10MB</div>
                </div>
              </div>

              <!-- Actions -->
              <button class="btn btn-teal btn-lg" id="saveBtn" onclick="window._savePassport()" style="justify-content:center;">💾 Save Passport</button>
              <a href="assessment.html" class="btn btn-primary btn-lg" style="justify-content:center;display:flex;">🎯 Take Language Assessment →</a>

            </div>
          </div>
        </div>
      </div>
    </div>`;

  // Expose toast globally (used by inline onclick)
  window.toast = toast;
  renderAudioPreview();
}

// ── Speaking clip helpers ─────────────────────────────────────────────────────

function renderClipStatus() {
  if (!passport.speaking_clip_url) return '';
  return `
    <div style="background:var(--teal-light);border:1px solid rgba(26,122,110,.2);border-radius:8px;padding:.7rem .9rem;margin-bottom:.8rem;display:flex;align-items:center;justify-content:space-between;gap:.8rem;">
      <div style="display:flex;align-items:center;gap:.5rem;">
        <span style="color:var(--teal);">✓</span>
        <span style="font-size:.85rem;font-weight:600;color:var(--teal);">Speaking clip uploaded</span>
      </div>
      <button onclick="window._removeClip()" style="background:none;border:none;cursor:pointer;font-size:.78rem;color:var(--gray);text-decoration:underline;">Remove</button>
    </div>`;
}

function renderAudioPreview() {
  const el = document.getElementById('pvAudio');
  if (!el) return;
  if (!passport.speaking_clip_url) {
    el.innerHTML = '<span style="font-size:.72rem;opacity:.6;">No speaking clip yet — add one for +10%</span>';
    return;
  }
  el.innerHTML = `
    <div style="background:rgba(255,255,255,.12);border-radius:8px;padding:.55rem .8rem;">
      <div style="font-size:.65rem;opacity:.55;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;">Speaking sample</div>
      <audio controls style="width:100%;height:28px;" src="${passport.speaking_clip_url}"></audio>
    </div>`;
}

// ── Reactive update helpers (called from onclick) ─────────────────────────────

window._setCefr = (level) => {
  passport.cefr_level = level;
  document.querySelectorAll('#irishGrid .cefr-option').forEach(b => b.classList.remove('sel'));
  event.target.classList.add('sel');
  updatePreviews();
};

window._setType = (type) => {
  passport.profile_type = type;
  document.querySelectorAll('.cefr-option').forEach(b => {
    if (b.textContent.includes('looking') || b.textContent.includes('offers')) b.classList.remove('sel');
  });
  event.target.classList.add('sel');
  updatePreviews();
};

window._setField = (prop, val) => {
  passport[prop] = val;
  updatePreviews();
};

window._addSkill = () => {
  const inp = document.getElementById('skillInput');
  const s = inp.value.trim();
  if (s && !(passport.skills || []).includes(s)) {
    passport.skills = [...(passport.skills || []), s];
    inp.value = '';
    refreshSkillsDisplay();
    updatePreviews();
  }
};

window._removeSkill = (i) => {
  passport.skills.splice(i, 1);
  refreshSkillsDisplay();
  updatePreviews();
};

function refreshSkillsDisplay() {
  const el = document.getElementById('skillsDisplay');
  if (!el) return;
  el.innerHTML = (passport.skills || []).length
    ? passport.skills.map((s, i) => `<span class="skill-chip">${s}<button onclick="window._removeSkill(${i})">×</button></span>`).join('')
    : '<span style="font-size:.82rem;color:var(--gray);">No skills added yet</span>';
}

function updatePreviews() {
  const pct = calcPct();
  // Top bar
  const pctLbl = document.getElementById('pctLbl');
  const pFill  = document.getElementById('pFill');
  if (pctLbl) pctLbl.textContent = pct + '%';
  if (pFill)  pFill.style.width  = pct + '%';
  // Re-render passport card preview
  const preview = document.getElementById('passportPreview');
  if (preview) {
    preview.innerHTML = renderPassportCard();
    renderAudioPreview();
  }
}

// ── Speaking clip upload to Supabase Storage ──────────────────────────────────

window._handleClipDrop = (e) => {
  const file = e.dataTransfer.files[0];
  if (file) window._uploadClip(file);
};

window._uploadClip = async (file) => {
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { toast('File too large — max 10MB', 'error'); return; }

  const zone = document.getElementById('uploadZone');
  zone.innerHTML = `
    <div style="font-size:1.2rem;margin-bottom:.3rem;">⏳</div>
    <div style="font-weight:600;font-size:.85rem;">Uploading…</div>`;

  const ext      = file.name.split('.').pop() || 'mp3';
  const filePath = `${userId}/speaking-clip.${ext}`;

  // Remove existing clip first (ignore error)
  await supabase.storage.from('speaking-clips').remove([filePath]);

  const { error: upErr } = await supabase.storage
    .from('speaking-clips')
    .upload(filePath, file, { upsert: true, contentType: file.type });

  if (upErr) {
    toast('Upload failed: ' + upErr.message, 'error');
    zone.innerHTML = `
      <div style="font-size:1.5rem;margin-bottom:.4rem;">🎙️</div>
      <div style="font-weight:600;font-size:.88rem;margin-bottom:.2rem;">Click to upload or drag & drop</div>
      <div style="font-size:.78rem;color:var(--gray);">MP3 / M4A · max 10MB</div>`;
    return;
  }

  // Get public URL (bucket is private — use signed URL)
  const { data: signedData } = await supabase.storage
    .from('speaking-clips')
    .createSignedUrl(filePath, 60 * 60 * 24 * 7); // 7-day signed URL

  const url = signedData?.signedUrl || null;

  // Save URL to candidates table immediately
  await supabase.from('candidates').update({ speaking_clip_url: url }).eq('id', userId);

  passport.speaking_clip_url = url;
  toast('Speaking clip uploaded! ✓');

  // Refresh clip status area and re-render zone
  document.getElementById('clipStatus').innerHTML = renderClipStatus();
  zone.innerHTML = `
    <div style="font-size:1.5rem;margin-bottom:.4rem;">🎙️</div>
    <div style="font-weight:600;font-size:.88rem;margin-bottom:.2rem;">Click to replace clip</div>
    <div style="font-size:.78rem;color:var(--gray);">MP3 / M4A · max 10MB</div>`;

  updatePreviews();
};

window._removeClip = async () => {
  if (!confirm('Remove your speaking clip?')) return;
  await supabase.from('candidates').update({ speaking_clip_url: null }).eq('id', userId);
  passport.speaking_clip_url = null;
  document.getElementById('clipStatus').innerHTML = '';
  updatePreviews();
  toast('Speaking clip removed');
};

// ── Save passport to Supabase candidates table ────────────────────────────────

window._savePassport = async () => {
  const btn = document.getElementById('saveBtn');
  btn.textContent = 'Saving…';
  btn.disabled = true;

  const updates = {
    full_name:         passport.full_name,
    county:            passport.county,
    cefr_level:        passport.cefr_level,
    profile_type:      passport.profile_type,
    bio:               passport.bio,
    skills:            passport.skills || [],
    available_from:    passport.available_from || null,
  };

  const { error } = await supabase
    .from('candidates')
    .update(updates)
    .eq('id', userId);

  btn.textContent = '💾 Save Passport';
  btn.disabled = false;

  if (error) {
    toast('Save failed: ' + error.message, 'error');
  } else {
    toast('Passport saved! ✓');
  }
};

// ── Main init ─────────────────────────────────────────────────────────────────

async function init() {
  // 1. Check session
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) {
    window.location.href = 'login.html';
    return;
  }

  userId = session.user.id;

  // 2. Load candidate row
  const { data: candidate, error } = await supabase
    .from('candidates')
    .select('full_name, email, county, cefr_level, profile_type, bio, skills, available_from, speaking_clip_url, assessment_completed, verified')
    .eq('id', userId)
    .single();

  if (error || !candidate) {
    // Could be an employer who navigated here
    window.location.href = 'employer-dashboard.html';
    return;
  }

  // 3. Populate state from DB
  passport = {
    full_name:         candidate.full_name        || '',
    email:             candidate.email             || session.user.email || '',
    county:            candidate.county            || '',
    cefr_level:        candidate.cefr_level        || 'B1',
    profile_type:      candidate.profile_type      || 'active',
    bio:               candidate.bio               || '',
    skills:            candidate.skills            || [],
    available_from:    candidate.available_from    || '',
    speaking_clip_url: candidate.speaking_clip_url || null,
    assessment_completed: candidate.assessment_completed || false,
    verified:          candidate.verified          || false,
  };

  // 4. Expose logout globally
  window._poistLogout = logout;

  // 5. Hide loading, render page
  document.getElementById('loadingScreen').style.display = 'none';
  document.getElementById('shell').style.display = 'flex';
  renderPage();
}

init();
</script>
