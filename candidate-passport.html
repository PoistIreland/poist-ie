<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>poist.ie — Language Passport</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#1A7A6E;--teal-dark:#0f5a51;--teal-light:#E8F5F3;--teal-mid:#2a9d8f;
  --gold:#F5C518;--gold-dark:#d4a800;
  --dark:#1A1A2E;--gray:#6B7280;--cream:#F5F2ED;--border:#E5E7EB;--white:#ffffff;
  --red:#dc2626;--green:#16a34a;
  --forest:#0D3B2E;
  --green2:#2D8653;
  --gold2:#C9921A;
  --ink:#0F1A13;
  --body:#2E3C34;
  --muted:#6B7F72;
  --gray-faint:#C4D4CB;
  --off:#F5F7F5;
  --radius:14px;
  --mono:'JetBrains Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#F5F2ED;color:var(--dark);overflow-x:hidden;}
input,select,textarea{font-family:'DM Sans',sans-serif;}
.app-shell{display:flex;min-height:100vh;}
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.page-content{flex:1;overflow-y:auto;padding:1.5rem;}
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.4rem;}
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.6rem 1.2rem;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;border:none;transition:all 0.18s;text-decoration:none;}
.btn-primary{background:var(--gold);color:var(--dark);}
.btn-primary:hover{background:var(--gold-dark);transform:translateY(-1px);}
.btn-teal{background:var(--teal);color:#fff;}
.btn-teal:hover{background:var(--teal-dark);}
.btn-outline{background:transparent;border:1.5px solid var(--teal);color:var(--teal);}
.btn-outline:hover{background:var(--teal-light);}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--gray);}
.btn-ghost:hover{border-color:var(--dark);color:var(--dark);}
.btn-danger{background:#fef2f2;border:1.5px solid #fecaca;color:var(--red);}
.btn-danger:hover{background:#fee2e2;}
.btn-lg{padding:0.8rem 1.8rem;font-size:1rem;border-radius:10px;}
.form-group{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem;}
.form-label{font-size:0.85rem;font-weight:600;color:var(--dark);}
.form-input{padding:0.65rem 0.9rem;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;color:var(--dark);background:var(--white);transition:border-color 0.18s;outline:none;}
.form-input:focus{border-color:var(--teal);}
.form-hint{font-size:0.78rem;color:var(--gray);}
select.form-input{cursor:pointer;}
.cefr-option{border:1.5px solid var(--border);border-radius:8px;padding:.6rem;cursor:pointer;font-weight:700;font-size:.9rem;color:var(--gray);transition:all .15s;text-align:center;background:var(--white);}
.cefr-option.sel{border-color:var(--teal);background:var(--teal-light);color:var(--teal);}
.skill-chip{background:var(--teal-light);color:var(--teal);padding:.28rem .65rem;border-radius:6px;font-size:.8rem;font-weight:600;display:inline-flex;align-items:center;gap:.3rem;}
.skill-chip button{background:none;border:none;cursor:pointer;color:var(--teal);font-size:.95rem;padding:0;line-height:1;}
.progress-bar{height:7px;background:var(--border);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--teal),var(--teal-mid));border-radius:4px;transition:width .4s ease;}

/* Qualification upload */
.qual-drop{border:2px dashed var(--border);border-radius:12px;padding:1.5rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--white);}
.qual-drop:hover,.qual-drop.dragover{border-color:var(--teal);background:var(--teal-light);}
.qual-badge{display:inline-flex;align-items:center;gap:.4rem;background:#dcfce7;border:1px solid #86efac;color:#16a34a;padding:.3rem .7rem;border-radius:6px;font-size:.78rem;font-weight:600;}
.qual-badge.pending{background:rgba(245,197,24,.15);border-color:rgba(245,197,24,.5);color:#92400E;}
.cefr-scale{display:flex;gap:3px;}
.cefr-pip{flex:1;height:6px;border-radius:3px;background:#E5E7EB;}
.cefr-pip.on{background:var(--gold);}
/* Recording UI */
.rec-idle{display:flex;align-items:center;gap:.6rem;}
.rec-active{display:flex;align-items:center;gap:.6rem;}
.rec-dot{width:10px;height:10px;border-radius:50%;background:var(--red);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
#loading-screen{position:fixed;inset:0;background:var(--cream);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:1rem;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.fade-in{animation:fadeIn 0.3s ease both;}
@media(max-width:768px){.two-col{grid-template-columns:1fr!important;}}
/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:.5rem 2rem}
.nav-logo{display:block}
.nav-links{display:flex;align-items:center;gap:1.8rem;font-size:.9rem;font-weight:500}
.nav-links a{color:var(--body);transition:color .15s}
.nav-links a:hover{color:var(--green)}
.ga-sm{font-size:.75rem;color:var(--muted);margin-left:.25rem}
.nav-links a.ghost{border:1.5px solid var(--border);border-radius:8px;padding:.4rem .9rem;color:var(--body)}
.nav-links a.ghost:hover{border-color:var(--green);color:var(--green)}
.nav-links a.cta{background:var(--gold);color:var(--forest);border-radius:8px;padding:.45rem 1.1rem;font-weight:700;transition:background .15s}
.nav-links a.cta:hover{background:#f7ce3a}
/* FOOTER */
footer{background:var(--ink);color:rgba(255,255,255,.6);padding:4rem 2rem 2rem}
.foot-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3rem;margin-bottom:3rem}
.foot-logo{margin-bottom:.9rem}
.foot-brand p{font-size:.85rem;line-height:1.7;max-width:260px;margin-bottom:.6rem}
.foot-brand .ga{font-size:.78rem;color:rgba(255,255,255,.3)}
footer h5{font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4);font-family:var(--mono);margin-bottom:1.1rem}
footer h5 .ga-sm{display:block;font-size:.65rem;text-transform:none;letter-spacing:0;margin-top:.2rem;color:rgba(255,255,255,.2)}
footer ul{list-style:none;display:flex;flex-direction:column;gap:.6rem}
footer ul a{font-size:.88rem;color:rgba(255,255,255,.55);transition:color .15s}
footer ul a:hover{color:var(--white)}
.foot-bottom{max-width:1200px;margin:0 auto;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.foot-bottom span{font-size:.8rem;color:rgba(255,255,255,.25)}
.foot-bottom .tag{font-size:.75rem;font-style:italic}
@media(max-width:1024px){.foot-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.nav{padding:.75rem 1rem}.nav-links{gap:1rem;font-size:.82rem}.foot-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <span style="font-size:0.9rem;color:var(--gray);">Loading passport…</span>
</div>

<div class="app-shell" id="shell" style="display:none;"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://kpfshjarepmazrgzffot.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZnNoamFyZXBtYXpyZ3pmZm90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDM2MDI1NTUsImV4cCI6MjA1OTE3ODU1NX0.pjCXFhFHMl0A5XFM1KGQdEBQ_WmFAz_of0VdvXfJ_5k';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

const LEVELS = ['A1','A2','B1','B2','C1','C2'];
const COUNTIES = ['Antrim','Armagh','Carlow','Cavan','Clare','Cork','Derry','Donegal','Down','Dublin','Fermanagh','Galway','Kerry','Kildare','Kilkenny','Laois','Leitrim','Limerick','Longford','Louth','Mayo','Meath','Monaghan','Offaly','Roscommon','Sligo','Tipperary','Tyrone','Waterford','Westmeath','Wexford','Wicklow'];

// State
let profile = {};       // from Supabase candidates row
let userId = null;
let pendingClipBlob = null;   // recorded audio not yet uploaded
let existingClipUrl = null;   // already on Supabase storage

// ── Helpers ────────────────────────────────────────────
const logo = (dark=false) => `<a href="index.html" style="text-decoration:none;font-family:'DM Sans',sans-serif;font-weight:700;font-size:1.65rem;letter-spacing:-0.03em;background:linear-gradient(90deg,${dark?'rgba(255,255,255,0.9),rgba(255,255,255,0.6)':'#0f5a51,#2a9d8f'});-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">poist.ie</a>`;

const toast = (msg, type='success') => {
  const el = document.createElement('div');
  const bg = type==='success'?'#1A7A6E':type==='error'?'#dc2626':'#1A1A2E';
  el.style.cssText = `position:fixed;bottom:1.5rem;right:1.5rem;background:${bg};color:#fff;padding:0.8rem 1.3rem;border-radius:10px;font-size:0.9rem;font-weight:500;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.2);animation:slideIn 0.3s ease;`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
};

const sidebar = () => `
  <aside style="width:220px;min-height:100vh;background:#0f5a51;display:flex;flex-direction:column;flex-shrink:0;">
    <div style="padding:1.4rem 1.2rem 1rem;border-bottom:1px solid rgba(255,255,255,0.1);">${logo(true)}</div>
    <nav class="nav">
  <a href="index.html" class="nav-logo">
    <img src="assets/poist-logo-trans.png" alt="poist.ie" style="height:70px; width:auto; display:block;">
  </a>
  <div class="nav-links">
    <a href="jobs.html">Browse Jobs <span class="ga-sm">/ Poist</span></a>
    <a href="employers.html">For Employers</a>
    <a href="cefr-guide.html">CEFR Guide</a>
    <a href="about.html">About</a>
    <a href="login.html" class="ghost">Log in</a>
    <a href="register-candidate.html" class="cta">Get Started</a>
  </div>
</nav>
    <div style="padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,0.1);">
      <button id="signout-btn" style="background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.7);padding:0.5rem 1rem;border-radius:6px;cursor:pointer;font-size:0.85rem;width:100%;text-align:left;">← Sign out</button>
    </div>
  </aside>`;

function calcPct() {
  let s = 0;
  if (profile.cefr_level) s += 30;
  if (profile.bio) s += 20;
  if ((profile.skills||[]).length >= 2) s += 20;
  if (profile.county) s += 15;
  if (profile.profile_type) s += 15;
  return s;
}

function cefrPips(level) {
  return LEVELS.map(l => `<div class="cefr-pip ${LEVELS.indexOf(l) <= LEVELS.indexOf(level) ? 'on' : ''}"></div>`).join('');
}

// ── Render full page ───────────────────────────────────
function renderPage() {
  const pct = calcPct();
  const skills = profile.skills || [];

  document.getElementById('shell').innerHTML = `
    ${sidebar()}
    <div class="main-area">
      <div style="height:60px;background:#fff;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;flex-shrink:0;">
        <h1 style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;">My Language Passport</h1>
        <div style="display:flex;align-items:center;gap:0.8rem;">
          <div style="width:32px;height:32px;border-radius:50%;background:#E8F5F3;display:flex;align-items:center;justify-content:center;font-size:1.1rem;">👤</div>
          <span style="font-size:0.88rem;font-weight:500;color:#374151;">${profile.full_name||'Candidate'}</span>
        </div>
      </div>
      <div class="page-content fade-in">
        <div style="max-width:860px;margin:0 auto;">

          <!-- Progress bar -->
          <div class="card" style="margin-bottom:1.2rem;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;">
              <span style="font-weight:600;font-size:.9rem;">Passport completion</span>
              <span id="pctLbl" style="font-family:'Syne',sans-serif;font-weight:800;color:var(--teal);">${pct}%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:${pct}%"></div></div>
            <p style="font-size:.82rem;color:var(--gray);margin-top:.5rem;">A complete passport gets 3× more employer views.</p>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;" class="two-col">

            <!-- Passport preview card -->
            <div>
              <div class="card" style="background:linear-gradient(145deg,var(--teal-dark),var(--teal));color:#fff;border:none;">
                <div style="display:flex;align-items:center;gap:.8rem;margin-bottom:1.2rem;">
                  <div style="width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.5rem;">👤</div>
                  <div>
                    <div style="font-family:'Syne',sans-serif;font-weight:700;" id="pvName">${profile.full_name||'Your Name'}</div>
                    <div id="pvSub" style="font-size:.78rem;opacity:.7;">${profile.profile_type||'Add role'} · ${profile.county||'Add county'}</div>
                  </div>
                </div>
                <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;opacity:.55;margin-bottom:.4rem;">Language Passport · poist.ie</div>

                <!-- Irish CEFR -->
                <div style="background:rgba(255,255,255,.13);border-radius:7px;padding:.75rem 1rem;margin-bottom:.7rem;">
                  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;font-size:.83rem;font-weight:600;">
                    Irish
                    <span id="pvIrish" style="background:var(--gold);color:var(--dark);padding:.12rem .45rem;border-radius:4px;font-size:.7rem;font-weight:700;">${profile.cefr_level||'—'}</span>
                  </div>
                  <div class="cefr-scale" id="pvIrishScale">${cefrPips(profile.cefr_level||'A1')}</div>
                  <div style="display:flex;justify-content:space-between;margin-top:.3rem;">${LEVELS.map(l=>`<span style="font-size:.6rem;opacity:.55;">${l}</span>`).join('')}</div>
                </div>

                <!-- Skills -->
                <div id="pvSkills" style="display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:.8rem;">
                  ${skills.map(s=>`<span style="background:rgba(255,255,255,.15);border-radius:5px;padding:.2rem .5rem;font-size:.7rem;">${s}</span>`).join('')}
                </div>

                <!-- Speaking clip display -->
                <div id="pvAudio" style="margin-bottom:.8rem;">
                  ${existingClipUrl
                    ? `<div style="background:rgba(255,255,255,.12);border-radius:8px;padding:.55rem .8rem;">
                         <div style="font-size:.65rem;opacity:.55;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;">Speaking sample</div>
                         <audio controls style="width:100%;height:28px;" src="${existingClipUrl}"></audio>
                       </div>`
                    : `<div style="font-size:.72rem;color:rgba(255,255,255,.5);font-style:italic;">No speaking sample yet — record below</div>`
                  }
                </div>

                <div style="display:inline-flex;align-items:center;gap:.3rem;background:rgba(245,197,24,.2);border:1px solid rgba(245,197,24,.35);color:var(--gold);padding:.25rem .6rem;border-radius:100px;font-size:.68rem;font-weight:600;">✓ Official Irish Candidate · poist.ie</div>
              </div>
            </div>

            <!-- Edit panels -->
            <div style="display:flex;flex-direction:column;gap:.9rem;">

              <!-- Irish proficiency -->
              <div class="card">
                <h3 style="font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:.9rem;">Irish proficiency</h3>
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem;" id="irishGrid">
                  ${LEVELS.map(l=>`<button class="cefr-option ${profile.cefr_level===l?'sel':''}" data-level="${l}" data-grid="irishGrid" data-prop="cefr_level">${l}</button>`).join('')}
                </div>
              </div>

              <!-- Profile details -->
              <div class="card">
                <h3 style="font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:.8rem;">Profile details</h3>
                <div class="form-group">
                  <label class="form-label">Role / job title</label>
                  <input type="text" id="profileType" class="form-input" value="${profile.profile_type||''}" placeholder="e.g. Irish Language Officer">
                </div>
                <div class="form-group">
                  <label class="form-label">County</label>
                  <select id="countysel" class="form-input">
                    <option value="">Select county…</option>
                    ${COUNTIES.map(c=>`<option value="${c}" ${profile.county===c?'selected':''}>${c}</option>`).join('')}
                  </select>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                  <label class="form-label">Short bio</label>
                  <textarea id="bio" class="form-input" rows="3" placeholder="Tell employers about yourself…">${profile.bio||''}</textarea>
                </div>
              </div>

              <!-- Skills -->
              <div class="card">
                <h3 style="font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:.8rem;">Skills</h3>
                <div id="skillsDisplay" style="display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.8rem;">
                  ${skills.map((s,i)=>`<span class="skill-chip">${s}<button data-skill-index="${i}">×</button></span>`).join('')}
                </div>
                <div style="display:flex;gap:.5rem;">
                  <input type="text" id="skillInput" class="form-input" placeholder="Add a skill…" style="flex:1;">
                  <button class="btn btn-teal" id="addSkillBtn">Add</button>
                </div>
                <p class="form-hint" style="margin-top:.4rem;">e.g. Public Speaking, Teaching, Policy, Content Writing</p>
              </div>

              <!-- Speaking clip recorder -->
              <div class="card">
                <h3 style="font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:.4rem;">Speaking sample</h3>
                <p style="font-size:.82rem;color:var(--gray);margin-bottom:.9rem;">Record a 30–60 second clip speaking Irish. Saved with your passport when you click Save.</p>

                <div id="recPrompt" style="background:var(--teal-light);border-radius:8px;padding:.75rem 1rem;margin-bottom:.9rem;font-size:.85rem;color:var(--teal);">
                  <strong>Prompt:</strong> Déan cur síos ort féin agus mínigh cén fáth a bhfuil tú ag lorg poist le Gaeilge.
                  <div style="font-size:.75rem;opacity:.7;margin-top:.25rem;">(Describe yourself and explain why you are looking for a job through Irish.)</div>
                </div>

                <div id="recControls">
                  <!-- Idle state -->
                  <div id="recIdle">
                    <button class="btn btn-teal" id="startRecBtn">🎤 Start Recording</button>
                    ${pendingClipBlob
                      ? `<span style="font-size:.8rem;color:var(--teal);margin-left:.7rem;">✓ New recording ready to save</span>`
                      : existingClipUrl
                        ? `<span style="font-size:.8rem;color:var(--gray);margin-left:.7rem;">Existing sample on file — record to replace</span>`
                        : ''
                    }
                  </div>
                  <!-- Active recording state (hidden by default) -->
                  <div id="recActive" style="display:none;align-items:center;gap:.8rem;">
                    <div class="rec-dot"></div>
                    <span style="font-size:.88rem;font-weight:600;color:var(--red);">Recording…</span>
                    <span id="recTimer" style="font-size:.85rem;color:var(--gray);">0:00</span>
                    <button class="btn btn-danger" id="stopRecBtn">⏹ Stop</button>
                  </div>
                </div>

                <!-- Playback (shown after recording) -->
                <div id="recPlayback" style="display:${pendingClipBlob?'block':'none'};margin-top:.8rem;">
                  <audio id="recAudio" controls style="width:100%;height:32px;"></audio>
                  <button class="btn btn-ghost" id="discardRecBtn" style="margin-top:.5rem;font-size:.8rem;">✕ Discard & re-record</button>
                </div>
              </div>

              <!-- Qualification Upload -->
              <div class="card">
                <h3 style="font-family:'Syne',sans-serif;font-weight:700;font-size:.95rem;margin-bottom:.4rem;">Have a qualification in Irish?</h3>
                <p style="font-size:.82rem;color:var(--gray);margin-bottom:.9rem;">Upload your Leaving Cert, TEG, SCG or other Irish language qualification and we'll assign your CEFR level automatically — no assessment needed.</p>

                <div class="form-group" style="margin-bottom:.8rem;">
                  <label class="form-label">Qualification type</label>
                  <select id="qualType" class="form-input">
                    <option value="">Select your qualification…</option>
                    <optgroup label="Leaving Certificate">
                      <option value="lc_higher_h1h2">Leaving Cert Higher Irish — H1/H2 → B2</option>
                      <option value="lc_higher_h3h4">Leaving Cert Higher Irish — H3/H4 → B1</option>
                      <option value="lc_ordinary">Leaving Cert Ordinary Irish — O1/O2 → A2</option>
                    </optgroup>
                    <optgroup label="Teastas Eorpach na Gaeilge (TEG)">
                      <option value="teg_a2">TEG A2 → A2</option>
                      <option value="teg_b1">TEG B1 → B1</option>
                      <option value="teg_b2">TEG B2 → B2</option>
                      <option value="teg_c1">TEG C1 → C1</option>
                    </optgroup>
                    <optgroup label="Other qualifications">
                      <option value="scg">Scrúdú Cáilíochta sa Ghaeilge (SCG) → C1/C2</option>
                      <option value="degree">Diploma / Degree with Irish → B2/C1</option>
                      <option value="cefr_cert">Existing CEFR certificate → Direct match</option>
                    </optgroup>
                  </select>
                </div>

                <div class="qual-drop" id="qualDrop" onclick="document.getElementById('qualFile').click()">
                  <div id="qualDropInner">
                    <div style="font-size:1.5rem;margin-bottom:.4rem;">📄</div>
                    <div style="font-size:.88rem;font-weight:600;color:var(--navy);">Click to upload or drag & drop</div>
                    <div style="font-size:.75rem;color:var(--gray);margin-top:.2rem;">PDF, JPG or PNG · Max 5MB</div>
                  </div>
                  <input type="file" id="qualFile" accept=".pdf,.jpg,.jpeg,.png" style="display:none;" onchange="handleQualFile(this)">
                </div>

                <div id="qualStatus" style="display:none;margin-top:.8rem;"></div>

                <button class="btn btn-teal" id="qualSubmitBtn" onclick="submitQualification()" style="width:100%;justify-content:center;margin-top:.8rem;display:none;">
                  Upload Qualification →
                </button>
                <p style="font-size:.75rem;color:var(--gray);margin-top:.5rem;">Your profile will show a "Qualification Submitted" badge. We don't need to verify the document to assign your level.</p>
              </div>

              <!-- Actions -->
              <a href="assessment.html" class="btn btn-primary btn-lg" style="justify-content:center;display:flex;">🎯 Take Language Assessment →</a>
              <button class="btn btn-teal btn-lg" id="saveBtn" style="justify-content:center;">💾 Save Passport</button>
              <div id="saveStatus" style="text-align:center;font-size:.82rem;color:var(--gray);min-height:1.2rem;"></div>

            </div>
          </div>
        </div>
      </div>
    </div>`;

  bindEvents();
}

// ── Event bindings ─────────────────────────────────────
function bindEvents() {
  // Sign out
  document.getElementById('signout-btn').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  });

  // CEFR buttons
  document.querySelectorAll('[data-prop]').forEach(btn => {
    btn.addEventListener('click', () => {
      const prop = btn.dataset.prop;
      const grid = btn.dataset.grid;
      profile[prop] = btn.dataset.level;
      document.querySelectorAll(`#${grid} .cefr-option`).forEach(b => b.classList.remove('sel'));
      btn.classList.add('sel');
      updatePreviews();
    });
  });

  // Live field sync
  document.getElementById('profileType').addEventListener('input', e => { profile.profile_type = e.target.value; updatePreviews(); });
  document.getElementById('countysel').addEventListener('change', e => { profile.county = e.target.value; updatePreviews(); });
  document.getElementById('bio').addEventListener('input', e => { profile.bio = e.target.value; updatePreviews(); });

  // Skills
  document.getElementById('addSkillBtn').addEventListener('click', addSkill);
  document.getElementById('skillInput').addEventListener('keydown', e => { if (e.key === 'Enter') addSkill(); });
  document.getElementById('skillsDisplay').addEventListener('click', e => {
    const btn = e.target.closest('[data-skill-index]');
    if (btn) removeSkill(parseInt(btn.dataset.skillIndex));
  });

  // Recording
  document.getElementById('startRecBtn').addEventListener('click', startRecording);
  document.getElementById('stopRecBtn').addEventListener('click', stopRecording);
  document.getElementById('discardRecBtn').addEventListener('click', discardRecording);

  // Save
  document.getElementById('saveBtn').addEventListener('click', savePassport);

  // If we have a pending blob already (page re-render), set up audio src
  if (pendingClipBlob) {
    const url = URL.createObjectURL(pendingClipBlob);
    document.getElementById('recAudio').src = url;
  }
}

// ── Skills ─────────────────────────────────────────────
function addSkill() {
  const inp = document.getElementById('skillInput');
  const s = inp.value.trim();
  if (s && !(profile.skills||[]).includes(s)) {
    profile.skills = [...(profile.skills||[]), s];
    inp.value = '';
    refreshSkillsUI();
    updatePreviews();
  }
}

function removeSkill(i) {
  profile.skills.splice(i, 1);
  refreshSkillsUI();
  updatePreviews();
}

function refreshSkillsUI() {
  document.getElementById('skillsDisplay').innerHTML =
    (profile.skills||[]).map((s,i) => `<span class="skill-chip">${s}<button data-skill-index="${i}">×</button></span>`).join('');
  // Re-bind remove buttons
  document.getElementById('skillsDisplay').querySelectorAll('[data-skill-index]').forEach(btn => {
    btn.addEventListener('click', () => removeSkill(parseInt(btn.dataset.skillIndex)));
  });
}

// ── Live preview updates ───────────────────────────────
function updatePreviews() {
  const pct = calcPct();
  document.getElementById('pctLbl').textContent = pct + '%';
  document.getElementById('pFill').style.width = pct + '%';
  document.getElementById('pvSub').textContent = `${profile.profile_type||'Add role'} · ${profile.county||'Add county'}`;
  document.getElementById('pvIrish').textContent = profile.cefr_level || '—';
  document.getElementById('pvIrishScale').innerHTML = cefrPips(profile.cefr_level || 'A1');
  document.getElementById('pvSkills').innerHTML =
    (profile.skills||[]).map(s => `<span style="background:rgba(255,255,255,.15);border-radius:5px;padding:.2rem .5rem;font-size:.7rem;">${s}</span>`).join('');
}

// ── Recording ──────────────────────────────────────────
let mediaRecorder = null;
let recordedChunks = [];
let timerInterval = null;
let recordingSeconds = 0;

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recordedChunks = [];
    recordingSeconds = 0;
    mediaRecorder = new MediaRecorder(stream);

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(recordedChunks, { type: 'audio/webm' });
      pendingClipBlob = blob;

      const url = URL.createObjectURL(blob);
      const audioEl = document.getElementById('recAudio');
      audioEl.src = url;

      document.getElementById('recActive').style.display = 'none';
      document.getElementById('recIdle').style.display = 'block';
      document.getElementById('recPlayback').style.display = 'block';
      document.getElementById('startRecBtn').textContent = '🎤 Re-record';
      document.getElementById('startRecBtn').nextElementSibling && document.getElementById('startRecBtn').nextElementSibling.remove();
      // Show pending indicator
      const pending = document.createElement('span');
      pending.style.cssText = 'font-size:.8rem;color:var(--teal);margin-left:.7rem;';
      pending.textContent = '✓ New recording ready to save';
      document.getElementById('recIdle').appendChild(pending);

      clearInterval(timerInterval);
    };

    mediaRecorder.start(250);
    document.getElementById('recIdle').style.display = 'none';
    document.getElementById('recActive').style.display = 'flex';

    timerInterval = setInterval(() => {
      recordingSeconds++;
      const m = Math.floor(recordingSeconds / 60);
      const s = String(recordingSeconds % 60).padStart(2, '0');
      document.getElementById('recTimer').textContent = `${m}:${s}`;
      if (recordingSeconds >= 120) stopRecording(); // auto-stop at 2 min
    }, 1000);

  } catch (err) {
    toast('Microphone access denied — please allow mic access and try again.', 'error');
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
  clearInterval(timerInterval);
}

function discardRecording() {
  pendingClipBlob = null;
  document.getElementById('recPlayback').style.display = 'none';
  document.getElementById('recAudio').src = '';
  document.getElementById('startRecBtn').textContent = '🎤 Start Recording';
  // Remove pending indicator if present
  const indicator = document.getElementById('recIdle').querySelector('span');
  if (indicator) indicator.remove();
}

// ── Save passport ──────────────────────────────────────
async function savePassport() {
  const btn = document.getElementById('saveBtn');
  const status = document.getElementById('saveStatus');
  btn.disabled = true;
  btn.textContent = '💾 Saving…';
  status.textContent = '';

  try {
    let clipUrl = profile.speaking_clip_url || null;

    // 1. Upload new speaking clip if recorded
    if (pendingClipBlob) {
      status.textContent = 'Uploading speaking clip…';
      const ext = 'webm';
      const path = `${userId}/clip-${Date.now()}.${ext}`;
      const { error: uploadErr } = await sb.storage
        .from('speaking-clips')
        .upload(path, pendingClipBlob, { contentType: 'audio/webm', upsert: true });

      if (uploadErr) throw new Error('Speaking clip upload failed: ' + uploadErr.message);

      // Get public URL (storage is private — use signed URL for playback)
      const { data: signed } = await sb.storage
        .from('speaking-clips')
        .createSignedUrl(path, 60 * 60 * 24 * 365); // 1 year

      clipUrl = signed?.signedUrl || null;
      existingClipUrl = clipUrl;
      pendingClipBlob = null;

      // Update preview
      document.getElementById('pvAudio').innerHTML = `
        <div style="background:rgba(255,255,255,.12);border-radius:8px;padding:.55rem .8rem;">
          <div style="font-size:.65rem;opacity:.55;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;">Speaking sample</div>
          <audio controls style="width:100%;height:28px;" src="${clipUrl}"></audio>
        </div>`;
    }

    // 2. Build update payload — only columns that exist on candidates table
    const updates = {
      cefr_level: profile.cefr_level || null,
      profile_type: profile.profile_type || null,
      bio: profile.bio || null,
      county: profile.county || null,
      skills: profile.skills || [],
      speaking_clip_url: clipUrl,
    };

    status.textContent = 'Saving profile…';
    const { error: updateErr } = await sb
      .from('candidates')
      .update(updates)
      .eq('id', userId);

    if (updateErr) throw new Error('Profile save failed: ' + updateErr.message);

    // Update local profile state
    Object.assign(profile, updates);

    toast('Passport saved!');
    status.textContent = `Last saved ${new Date().toLocaleTimeString('en-IE')}`;

  } catch (err) {
    console.error(err);
    toast(err.message || 'Save failed — please try again.', 'error');
    status.textContent = '';
  } finally {
    btn.disabled = false;
    btn.textContent = '💾 Save Passport';
  }
}

// ── CEFR mapping ──────────────────────────────────────
const QUAL_CEFR = {
  lc_higher_h1h2: 'B2', lc_higher_h3h4: 'B1', lc_ordinary: 'A2',
  teg_a2: 'A2', teg_b1: 'B1', teg_b2: 'B2', teg_c1: 'C1',
  scg: 'C1', degree: 'B2', cefr_cert: null // null = direct match, ask user
};

let pendingQualFile = null;

window.handleQualFile = (input) => {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { toast('File too large — max 5MB', 'error'); return; }
  pendingQualFile = file;
  document.getElementById('qualDropInner').innerHTML = `
    <div style="font-size:1.5rem;margin-bottom:.4rem;">✅</div>
    <div style="font-size:.88rem;font-weight:600;color:var(--teal);">${file.name}</div>
    <div style="font-size:.75rem;color:var(--gray);margin-top:.2rem;">${(file.size/1024).toFixed(0)}KB · Click to change</div>`;
  document.getElementById('qualDrop').style.borderColor = 'var(--teal)';
  document.getElementById('qualDrop').style.background = 'var(--teal-light)';
  const qualType = document.getElementById('qualType').value;
  if (qualType) document.getElementById('qualSubmitBtn').style.display = 'flex';
};

document.addEventListener('DOMContentLoaded', () => {
  const sel = document.getElementById('qualType');
  if (sel) sel.addEventListener('change', () => {
    if (sel.value && pendingQualFile) document.getElementById('qualSubmitBtn').style.display = 'flex';
    else if (!sel.value) document.getElementById('qualSubmitBtn').style.display = 'none';
  });
  // Drag and drop
  const drop = document.getElementById('qualDrop');
  if (drop) {
    drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
    drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
    drop.addEventListener('drop', e => {
      e.preventDefault(); drop.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) { const inp = document.getElementById('qualFile'); const dt = new DataTransfer(); dt.items.add(file); inp.files = dt.files; window.handleQualFile(inp); }
    });
  }
});

window.submitQualification = async () => {
  const qualType = document.getElementById('qualType').value;
  if (!qualType) { toast('Please select your qualification type', 'error'); return; }
  if (!pendingQualFile) { toast('Please upload your qualification document', 'error'); return; }

  const btn = document.getElementById('qualSubmitBtn');
  btn.textContent = 'Uploading…'; btn.disabled = true;

  try {
    // Upload document to Supabase storage
    const ext = pendingQualFile.name.split('.').pop();
    const path = `${userId}/qual-${Date.now()}.${ext}`;
    const { error: uploadErr } = await sb.storage
      .from('speaking-clips') // reuse same bucket for now
      .upload(path, pendingQualFile, { contentType: pendingQualFile.type, upsert: true });
    if (uploadErr) throw new Error('Upload failed: ' + uploadErr.message);

    // Assign CEFR level from mapping
    const assignedCefr = QUAL_CEFR[qualType];
    const updates = {
      qualification_type: qualType,
      qualification_submitted: true,
    };
    // Auto-assign CEFR if mapping is definitive
    if (assignedCefr) {
      updates.cefr_level = assignedCefr;
      profile.cefr_level = assignedCefr;
      // Update the CEFR selector UI
      document.querySelectorAll('#irishGrid .cefr-option').forEach(b => {
        b.classList.toggle('sel', b.dataset.level === assignedCefr);
      });
      updatePreviews();
    }

    const { error: updateErr } = await sb.from('candidates').update(updates).eq('id', userId);
    if (updateErr) throw new Error('Save failed: ' + updateErr.message);

    // Show success state
    const qualLabel = document.getElementById('qualType').options[document.getElementById('qualType').selectedIndex].text.split(' →')[0];
    document.getElementById('qualStatus').style.display = 'block';
    document.getElementById('qualStatus').innerHTML = `
      <div class="qual-badge pending">📄 Qualification Submitted</div>
      <div style="font-size:.82rem;color:var(--gray);margin-top:.5rem;">
        <strong>${qualLabel}</strong>${assignedCefr ? ` → CEFR level set to <strong>${assignedCefr}</strong>` : ''}<br>
        Your profile now shows a "Qualification Submitted" badge.
      </div>`;
    btn.style.display = 'none';
    toast('Qualification uploaded — CEFR level updated!');
  } catch (err) {
    console.error(err);
    toast(err.message || 'Upload failed', 'error');
    btn.textContent = 'Upload Qualification →'; btn.disabled = false;
  }
};

// ── Init ───────────────────────────────────────────────
async function init() {
  // 1. Session check
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  userId = session.user.id;

  // 2. Load candidate profile
  const { data: candidate, error } = await sb
    .from('candidates')
    .select('*')
    .eq('id', userId)
    .single();

  if (error || !candidate) {
    window.location.href = 'register-candidate.html';
    return;
  }

  profile = { ...candidate };
  existingClipUrl = candidate.speaking_clip_url || null;

  // 3. Render
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('shell').style.display = 'flex';
  renderPage();
}

init().catch(err => {
  console.error(err);
  document.getElementById('loading-screen').innerHTML = `
    <div style="text-align:center;padding:2rem;">
      <div style="font-size:2rem;margin-bottom:1rem;">⚠️</div>
      <p style="color:#dc2626;font-weight:600;margin-bottom:1rem;">Could not load passport</p>
      <a href="login.html" style="color:#1A7A6E;text-decoration:underline;">Back to login</a>
    </div>`;
});
</script>
