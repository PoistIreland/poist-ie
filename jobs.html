<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>poist.ie — Browse Jobs</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root{
  --teal:#1A6B3C;--teal-dark:#0D3B2E;--teal-mid:#2D8653;--teal-light:#F5F7F5;
  --gold:#F5C518;--gold-dark:#C9921A;
  --navy:#0F1A13;--gray:#6B7F72;--cream:#FFFFFF;--border:#E5E7EB;--white:#ffffff;
  --forest:#0D3B2E;
  --green:#1A6B3C;
  --green2:#2D8653;
  --gold2:#C9921A;
  --ink:#0F1A13;
  --body:#2E3C34;
  --muted:#6B7F72;
  --gray-faint:#C4D4CB;
  --off:#F5F7F5;
  --radius:14px;
  --mono:'JetBrains Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--navy);overflow-x:hidden;}
input,select{font-family:'DM Sans',sans-serif;}
a{text-decoration:none;}

/* NAV */
nav{height:auto}
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:.5rem 2rem}
.nav-logo{display:block}
.nav-links{display:flex;align-items:center;gap:1.8rem;font-size:.9rem;font-weight:500}
.nav-links a{color:var(--body);transition:color .15s}
.nav-links a:hover{color:var(--green)}
.ga-sm{font-size:.75rem;color:var(--muted);margin-left:.25rem}
.nav-links a.ghost{border:1.5px solid var(--border);border-radius:8px;padding:.4rem .9rem;color:var(--body)}
.nav-links a.ghost:hover{border-color:var(--green);color:var(--green)}
.nav-links a.cta{background:var(--gold);color:var(--forest);border-radius:8px;padding:.45rem 1.1rem;font-weight:700;transition:background .15s}
.nav-links a.cta:hover{background:#f7ce3a}
/* FOOTER */
footer{background:var(--ink);color:rgba(255,255,255,.6);padding:4rem 2rem 2rem}
.foot-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3rem;margin-bottom:3rem}
.foot-logo{margin-bottom:.9rem}
.foot-brand p{font-size:.85rem;line-height:1.7;max-width:260px;margin-bottom:.6rem}
.foot-brand .ga{font-size:.78rem;color:rgba(255,255,255,.3)}
footer h5{font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4);font-family:var(--mono);margin-bottom:1.1rem}
footer h5 .ga-sm{display:block;font-size:.65rem;text-transform:none;letter-spacing:0;margin-top:.2rem;color:rgba(255,255,255,.2)}
footer ul{list-style:none;display:flex;flex-direction:column;gap:.6rem}
footer ul a{font-size:.88rem;color:rgba(255,255,255,.55);transition:color .15s}
footer ul a:hover{color:var(--white)}
.foot-bottom{max-width:1200px;margin:0 auto;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.foot-bottom span{font-size:.8rem;color:rgba(255,255,255,.25)}
.foot-bottom .tag{font-size:.75rem;font-style:italic}
@media(max-width:1024px){.foot-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.nav{padding:.75rem 1rem}.nav-links{gap:1rem;font-size:.82rem}.foot-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">
    <img src="assets/poist-logo-trans.png" alt="poist.ie" style="height:70px; width:auto; display:block;">
  </a>
  <div class="nav-links">
    <a href="jobs.html">Browse Jobs <span class="ga-sm">/ Poist</span></a>
    <a href="employers.html">For Employers</a>
    <a href="cefr-guide.html">CEFR Guide</a>
    <a href="about.html">About</a>
    <a href="login.html" class="ghost">Log in</a>
    <a href="register-candidate.html" class="cta">Get Started</a>
  </div>
</nav>

<div class="layout">
  <div class="sidebar">
    <div class="filters">
      <input type="text" id="sQ" class="search-input" placeholder="Search jobs, organisations…" oninput="filt()">
      <div class="filter-row">
        <select id="sCefr" class="filter-select" onchange="filt()">
          <option value="">All levels</option>
          <option>A1</option><option>A2</option><option>B1</option><option>B2</option><option>C1</option><option>C2</option>
        </select>
        <select id="sType" class="filter-select" onchange="filt()">
          <option value="">All types</option>
          <option>Full-time</option><option>Part-time</option><option>Contract</option>
        </select>
      </div>
    </div>
    <div class="job-list">
      <div id="jCnt" class="job-count">Loading…</div>
      <div id="jList"></div>
    </div>
  </div>

  <div style="position:relative;">
    <div id="map"></div>
    <div id="jDetail" class="detail-panel">
      <button class="detail-close" onclick="closeD()">×</button>
      <div id="jDContent"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const JOBS = [
  { id:1, title:'Irish Language Officer', org:'Department of Education', location:'Dublin', county:'Dublin', type:'Full-time', cefr:'B2', sector:'Government', posted:'2 days ago', lat:53.349, lng:-6.260, desc:'Lead Irish language strategy across the department, supporting the 2030 Official Languages Act targets.', salary:'€55,000 – €70,000', closing:'30 April 2026' },
  { id:2, title:'Bainisteoir Tionscadail', org:'Údarás na Gaeltachta', location:'Galway', county:'Galway', type:'Full-time', cefr:'C1', sector:'Semi-state', posted:'1 day ago', lat:53.270, lng:-9.056, desc:'Manage capital projects across Gaeltacht regions. Full Irish essential.', salary:'€50,000 – €65,000', closing:'25 April 2026' },
  { id:3, title:'Irish Language Teacher', org:'Coláiste Íde', location:'Dingle, Kerry', county:'Kerry', type:'Full-time', cefr:'C2', sector:'Education', posted:'3 days ago', lat:52.141, lng:-10.267, desc:'Teach Irish at secondary level at a leading Irish-medium college.', salary:'Per Teaching Council scale', closing:'20 April 2026' },
  { id:4, title:'Communications Officer (Irish)', org:'HSE', location:'Cork', county:'Cork', type:'Full-time', cefr:'B2', sector:'Healthcare', posted:'Today', lat:51.898, lng:-8.475, desc:'Produce Irish-language health communications for HSE Cork region.', salary:'€42,000 – €55,000', closing:'15 April 2026' },
  { id:5, title:'Tech Lead Gaeilge', org:'GlobalTech Ireland', location:'Cork', county:'Cork', type:'Full-time', cefr:'B1', sector:'Technology', posted:'5 days ago', lat:51.903, lng:-8.468, desc:'Lead a bilingual engineering team. Irish language skills valued.', salary:'€90,000 – €115,000', closing:'10 May 2026' },
  { id:6, title:'Content Creator', org:'TG4', location:'Galway', county:'Galway', type:'Contract', cefr:'C1', sector:'Media', posted:'Today', lat:53.274, lng:-9.049, desc:'Create engaging Irish-language video content for TG4 digital platforms.', salary:'€38,000 – €45,000', closing:'22 April 2026' },
  { id:7, title:'Irish Language Coordinator', org:'Limerick City Council', location:'Limerick', county:'Limerick', type:'Part-time', cefr:'B1', sector:'Government', posted:'1 week ago', lat:52.664, lng:-8.630, desc:'Coordinate Irish language services for Limerick City Council.', salary:'€28,000 – €34,000 (pro rata)', closing:'28 April 2026' },
  { id:8, title:'Community Manager', org:'Conradh na Gaeilge', location:'Dublin', county:'Dublin', type:'Full-time', cefr:'C2', sector:'Non-profit', posted:'4 days ago', lat:53.342, lng:-6.268, desc:'Manage community programmes and events promoting the Irish language.', salary:'€38,000 – €46,000', closing:'18 April 2026' },
];

const map = L.map('map').setView([53.4,-8.0],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);

const iconDefault = L.divIcon({html:`<div style="background:var(--gold,#F5C518);width:14px;height:14px;border-radius:50%;border:2px solid #C9921A;box-shadow:0 2px 6px rgba(0,0,0,.3);"></div>`,className:'',iconSize:[14,14]});
const iconActive  = L.divIcon({html:`<div style="background:#1A6B3C;width:18px;height:18px;border-radius:50%;border:2px solid #0D3B2E;box-shadow:0 2px 8px rgba(26,107,60,.5);"></div>`,className:'',iconSize:[18,18]});

let activeJ = null;
const mk = {};
JOBS.forEach(j => {
  const m = L.marker([j.lat,j.lng],{icon:iconDefault}).addTo(map);
  m.on('click',()=>showJ(j));
  mk[j.id] = m;
});

function cefrBadge(l){ return `<span class="cefr-badge">${l}</span>`; }

window.filt = () => {
  const q = document.getElementById('sQ').value.toLowerCase();
  const c = document.getElementById('sCefr').value;
  const t = document.getElementById('sType').value;
  const r = JOBS.filter(j =>
    (!q || j.title.toLowerCase().includes(q) || j.org.toLowerCase().includes(q) || j.location.toLowerCase().includes(q)) &&
    (!c || j.cefr === c) && (!t || j.type === t)
  );
  document.getElementById('jCnt').textContent = `${r.length} Irish language job${r.length!==1?'s':''}`;
  document.getElementById('jList').innerHTML = r.map(j => `
    <div class="job-card ${activeJ===j.id?'sel':''}" onclick="showJ(JOBS.find(x=>x.id===${j.id}))">
      <div class="job-card-top">
        <div class="job-title">${j.title}</div>
        ${cefrBadge(j.cefr)}
      </div>
      <div class="job-org">${j.org}</div>
      <div class="job-meta">
        📍 ${j.location}
        <span class="badge-gray">${j.type}</span>
        <span style="margin-left:auto;">${j.posted}</span>
      </div>
    </div>`).join('');
};

window.showJ = (j) => {
  activeJ = j.id;
  map.setView([j.lat,j.lng],10);
  Object.values(mk).forEach(m => m.setIcon(iconDefault));
  mk[j.id].setIcon(iconActive);
  document.getElementById('jDetail').style.display = 'block';
  document.getElementById('jDContent').innerHTML = `
    <div class="detail-title">${j.title}</div>
    <div class="detail-org">${j.org}</div>
    <div class="detail-meta">📍 ${j.location} · ${j.type} · ${j.posted}</div>
    <div class="detail-tags">
      ${cefrBadge(j.cefr)}
      <span class="badge-teal">${j.sector}</span>
    </div>
    <p class="detail-desc">${j.desc}</p>
    <div class="detail-salary">
      <span>💰 ${j.salary}</span>
      <span>📅 Closes ${j.closing}</span>
    </div>
    <a href="job.html?id=${j.id}" class="btn-primary">View Full Role →</a>
    <a href="job.html?id=${j.id}" class="btn-teal">Apply Now →</a>`;
  filt();
};

window.closeD = () => {
  document.getElementById('jDetail').style.display = 'none';
  activeJ = null;
  Object.values(mk).forEach(m => m.setIcon(iconDefault));
  filt();
};

filt();

const urlP = new URLSearchParams(window.location.search);
const hId = urlP.get('highlight');
if(hId){ const j = JOBS.find(x => x.id === parseInt(hId)); if(j) setTimeout(()=>showJ(j),400); }
</script>
</body>
</html>
