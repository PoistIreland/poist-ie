<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>poist.ie — Post a Job</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>/* poist.ie base styles — shared across all pages */
:root {
  --teal:#1A6B3C;--teal-dark:#0D3B2E;--teal-light:#F5F7F5;--teal-mid:#2D8653;
  --gold:#F5C518;--gold-dark:#C9921A;
  --dark:#0F1A13;--gray:#6B7F72;--cream:#FFFFFF;--border:#E5E7EB;--white:#ffffff;
  --red:#dc2626;--green:#16a34a;
  --sidebar-w:220px;
  --forest:#0D3B2E;
  --green2:#2D8653;
  --gold2:#C9921A;
  --ink:#0F1A13;
  --body:#2E3C34;
  --muted:#6B7F72;
  --gray-faint:#C4D4CB;
  --off:#F5F7F5;
  --radius:14px;
  --mono:'JetBrains Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#FFFFFF;color:var(--dark);overflow-x:hidden;}
input,select,textarea{font-family:'DM Sans',sans-serif;}
.logo{text-decoration:none;font-family:'DM Sans',sans-serif;font-weight:700;font-size:1.65rem;letter-spacing:-0.03em;background:linear-gradient(90deg,#0D3B2E,#2D8653);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* Layout */
.app-shell{display:flex;min-height:100vh;}
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.page-content{flex:1;overflow-y:auto;padding:1.5rem;}

/* Cards */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.4rem;}
.card-sm{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:1rem;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.6rem 1.2rem;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;border:none;transition:all 0.18s;text-decoration:none;}
.btn-primary{background:var(--gold);color:var(--dark);}
.btn-primary:hover{background:var(--gold-dark);transform:translateY(-1px);}
.btn-teal{background:var(--teal);color:#fff;}
.btn-teal:hover{background:var(--teal-dark);}
.btn-outline{background:transparent;border:1.5px solid var(--teal);color:var(--teal);}
.btn-outline:hover{background:var(--teal-light);}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--gray);}
.btn-ghost:hover{border-color:var(--dark);color:var(--dark);}
.btn-danger{background:#fef2f2;border:1.5px solid #fecaca;color:var(--red);}
.btn-danger:hover{background:#fee2e2;}
.btn-lg{padding:0.8rem 1.8rem;font-size:1rem;border-radius:10px;}

/* Form elements */
.form-group{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem;}
.form-label{font-size:0.85rem;font-weight:600;color:var(--dark);}
.form-input{padding:0.65rem 0.9rem;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;color:var(--dark);background:var(--white);transition:border-color 0.18s;outline:none;}
.form-input:focus{border-color:var(--teal);}
.form-input.error{border-color:var(--red);}
.form-hint{font-size:0.78rem;color:var(--gray);}
.form-error{font-size:0.78rem;color:var(--red);}
select.form-input{cursor:pointer;}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:0.18rem 0.55rem;border-radius:4px;font-size:0.72rem;font-weight:700;}
.badge-gold{background:var(--gold);color:var(--dark);}
.badge-teal{background:var(--teal-light);color:var(--teal);}
.badge-gray{background:#F3F4F6;color:var(--gray);}
.badge-green{background:#dcfce7;color:var(--green);}
.badge-red{background:#fef2f2;color:var(--red);}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.2rem;}
.stat-num{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--teal);}
.stat-label{font-size:0.78rem;color:var(--gray);margin-top:0.15rem;}

/* CEFR scale */
.cefr-scale{display:flex;gap:3px;}
.cefr-pip{flex:1;height:6px;border-radius:3px;background:#E5E7EB;}
.cefr-pip.on{background:var(--gold);}

/* Section header */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.section-hdr h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;}

/* Verified badge */
.verified{display:inline-flex;align-items:center;gap:0.3rem;background:#F5F7F5;color:var(--teal);font-size:0.72rem;font-weight:600;padding:0.18rem 0.55rem;border-radius:4px;}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.fade-in{animation:fadeIn 0.3s ease both;}

/* Public nav */
.pub-nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;height:66px;display:flex;align-items:center;justify-content:space-between;}
.pub-nav-links{display:flex;align-items:center;gap:1.8rem;}
.pub-nav-links a{text-decoration:none;color:var(--gray);font-weight:500;font-size:0.93rem;transition:color 0.2s;}
.pub-nav-links a:hover{color:var(--teal);}
.pub-nav-cta{background:var(--gold);color:var(--dark)!important;padding:0.5rem 1.2rem;border-radius:7px;font-weight:600;font-size:0.88rem;}
.pub-nav-cta:hover{background:var(--gold-dark)!important;}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .pub-nav-links{display:none;}
}

.cefr-option{border:1.5px solid var(--border);border-radius:8px;padding:.7rem 1rem;cursor:pointer;font-weight:700;font-size:.85rem;color:var(--gray);transition:all .15s;text-align:center;}.cefr-option.sel{border-color:var(--teal);background:var(--teal-light);color:var(--teal);}/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:.5rem 2rem}
.nav-logo{display:block}
.nav-links{display:flex;align-items:center;gap:1.8rem;font-size:.9rem;font-weight:500}
.nav-links a{color:var(--body);transition:color .15s}
.nav-links a:hover{color:var(--green)}
.ga-sm{font-size:.75rem;color:var(--muted);margin-left:.25rem}
.nav-links a.ghost{border:1.5px solid var(--border);border-radius:8px;padding:.4rem .9rem;color:var(--body)}
.nav-links a.ghost:hover{border-color:var(--green);color:var(--green)}
.nav-links a.cta{background:var(--gold);color:var(--forest);border-radius:8px;padding:.45rem 1.1rem;font-weight:700;transition:background .15s}
.nav-links a.cta:hover{background:#f7ce3a}
/* FOOTER */
footer{background:var(--ink);color:rgba(255,255,255,.6);padding:4rem 2rem 2rem}
.foot-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3rem;margin-bottom:3rem}
.foot-logo{margin-bottom:.9rem}
.foot-brand p{font-size:.85rem;line-height:1.7;max-width:260px;margin-bottom:.6rem}
.foot-brand .ga{font-size:.78rem;color:rgba(255,255,255,.3)}
footer h5{font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4);font-family:var(--mono);margin-bottom:1.1rem}
footer h5 .ga-sm{display:block;font-size:.65rem;text-transform:none;letter-spacing:0;margin-top:.2rem;color:rgba(255,255,255,.2)}
footer ul{list-style:none;display:flex;flex-direction:column;gap:.6rem}
footer ul a{font-size:.88rem;color:rgba(255,255,255,.55);transition:color .15s}
footer ul a:hover{color:var(--white)}
.foot-bottom{max-width:1200px;margin:0 auto;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.foot-bottom span{font-size:.8rem;color:rgba(255,255,255,.25)}
.foot-bottom .tag{font-size:.75rem;font-style:italic}
@media(max-width:1024px){.foot-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.nav{padding:.75rem 1rem}.nav-links{gap:1rem;font-size:.82rem}.foot-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app-shell" id="shell"></div>

<script>

// poist.ie shared utilities
// Replace localStorage calls with Supabase auth/db calls when going live

const POIST = {

  cefrLabel: { A1:'Beginner',A2:'Elementary',B1:'Intermediate',B2:'Upper-Intermediate',C1:'Advanced',C2:'Proficient/Native' },

  demoJobs: [

    { id:2, title:'Bainisteoir Tionscadail', org:'Údarás na Gaeltachta', location:'Galway', county:'Galway', type:'Full-time', cefr:'C1', sector:'Semi-state', posted:'1 day ago', lat:53.270, lng:-9.056, desc:'Manage capital projects across Gaeltacht regions. Full Irish essential.' },
    { id:3, title:'Irish Language Teacher', org:'Coláiste Íde', location:'Dingle, Kerry', county:'Kerry', type:'Full-time', cefr:'C2', sector:'Education', posted:'3 days ago', lat:52.141, lng:-10.267, desc:'Teach Irish at secondary level at a leading Irish-medium college.' },
    { id:4, title:'Communications Officer (Irish)', org:'HSE', location:'Cork', county:'Cork', type:'Full-time', cefr:'B2', sector:'Healthcare', posted:'Today', lat:51.898, lng:-8.475, desc:'Produce Irish-language health communications for HSE Cork region.' },
    { id:5, title:'Tech Lead Gaeilge', org:'GlobalTech Ireland', location:'Cork', county:'Cork', type:'Full-time', cefr:'B1', sector:'Technology', posted:'5 days ago', lat:51.903, lng:-8.468, desc:'Lead a bilingual engineering team. Irish language skills valued but not essential at native level.' },
    { id:6, title:'Content Creator', org:'TG4', location:'Galway', county:'Galway', type:'Contract', cefr:'C1', sector:'Media', posted:'Today', lat:53.274, lng:-9.049, desc:'Create engaging Irish-language video content for TG4 digital platforms.' },

    { id:4, name:'Seán Ó Briain', title:'Communications Manager', location:'Cork', cefr:'B2', englishCefr:'C1', skills:['PR','Social Media','Copywriting'], available:'Active', verified:false, avatar:'👨‍💼' },

const user=getUser('employer');
let cefrReq='B2';
document.getElementById('shell').innerHTML=`
  ${POIST.renderSidebar('employer','employer-post-job.html')}
  <div class="main-area">
    ${POIST.renderTopBar('Post a Job',user)}

              </div>

                <div class="form-group"><label class="form-label">Location</label><input type="text" id="jLoc" class="form-input" placeholder="e.g. Dublin, Galway" oninput="upPrev()"></div>
                <div class="form-group"><label class="form-label">County</label><select id="jCounty" class="form-input" onchange="upPrev()"><option value="">Select…</option>${county_opts}</select></div>

              <div class="form-group"><label class="form-label">Salary range (optional)</label><input type="text" id="jSalary" class="form-input" placeholder="e.g. €35,000–€45,000 or Negotiable" oninput="upPrev()"></div>

              </div>
              <div id="cefrHint" style="background:var(--teal-light);border-radius:8px;padding:.7rem;font-size:.82rem;color:var(--teal);">B2 — Candidates can handle complex Irish tasks independently. Good for most public sector roles.</div>
            </div>
            <div class="card">
              <h3 style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:1rem;">Description *</h3>
              <div class="form-group"><label class="form-label">Job description</label><textarea id="jDesc" class="form-input" rows="5" placeholder="Describe the role and responsibilities…" oninput="upPrev()"></textarea></div>
              <div class="form-group"><label class="form-label">Closing date</label><input type="date" id="jClose" class="form-input"></div>
            </div>
            <button class="btn btn-teal btn-lg" style="justify-content:center;" onclick="submitJob()">Submit for Review →</button>
          </div>
          <div style="position:sticky;top:1rem;">
            <div style="font-size:.78rem;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.6rem;">Live preview</div>
            <div class="card">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.5rem;"><div id="pvT" style="font-weight:700;font-size:1rem;color:var(--teal);flex:1;">Your job title</div><span id="pvC" style="background:var(--gold);color:var(--dark);font-size:.7rem;font-weight:700;padding:.15rem .45rem;border-radius:4px;margin-left:.5rem;">B2</span></div>
              <div style="font-size:.85rem;font-weight:600;margin-bottom:.2rem;">${user.name}</div>
              <div id="pvM" style="font-size:.8rem;color:var(--gray);margin-bottom:.8rem;">📍 Location · Full-time</div>
              <p id="pvD" style="font-size:.82rem;color:var(--gray);line-height:1.6;">Your description…</p>
            </div>
            <div style="margin-top:.8rem;background:var(--teal-light);border-radius:10px;padding:.9rem;font-size:.82rem;color:var(--teal);">
              <strong>Match estimate</strong><br>Candidates with <span id="pvCC">B2+</span> Irish: ~<strong>180 candidates</strong> in your area.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
window.setCefr=(v,el)=>{cefrReq=v;document.getElementById('cefrGrid').querySelectorAll('.cefr-option').forEach(b=>b.classList.remove('sel'));el.classList.add('sel');document.getElementById('pvC').textContent=v;document.getElementById('pvCC').textContent=v+'+';document.getElementById('cefrHint').textContent=`${v} — ${POIST.cefrLabel[v]}`;};
window.upPrev=()=>{document.getElementById('pvT').textContent=document.getElementById('jTitle').value||'Your job title';document.getElementById('pvM').textContent=`📍 ${document.getElementById('jLoc').value||'Location'} · ${document.getElementById('jType').value}`;document.getElementById('pvD').textContent=document.getElementById('jDesc').value||'Your description…';};
window.submitJob=()=>{if(!document.getElementById('jTitle').value){POIST.toast('Please add a job title','error');return;}if(!document.getElementById('jDesc').value){POIST.toast('Please add a description','error');return;}POIST.toast('Job submitted! Live within 24 hours.');setTimeout(()=>window.location.href='employer-dashboard.html',1800);};

</script>
</body>
</html>
