<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>poist.ie — Job Details</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#1A6B3C; --teal-dark:#0D3B2E; --teal-light:#F5F7F5; --teal-mid:#2D8653;
  --gold:#F5C518; --gold-dark:#C9921A;
  --dark:#0F1A13; --gray:#6B7F72; --cream:#FFFFFF; --border:#E5E7EB; --white:#ffffff;
  --forest:#0D3B2E;
  --green:#1A6B3C;
  --green2:#2D8653;
  --gold2:#C9921A;
  --ink:#0F1A13;
  --body:#2E3C34;
  --muted:#6B7F72;
  --gray-faint:#C4D4CB;
  --off:#F5F7F5;
  --radius:14px;
  --mono:'JetBrains Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);}

/* LAYOUT */
.page-wrap{max-width:1100px;margin:0 auto;padding:2rem 2rem 4rem;display:grid;grid-template-columns:1fr 340px;gap:2rem;align-items:start;}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:.5rem;font-size:.82rem;color:var(--muted);margin-bottom:1.5rem;}
.breadcrumb a{color:var(--green);text-decoration:none;font-weight:500;}
.breadcrumb a:hover{text-decoration:underline;}

/* JOB HEADER */
.job-header{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;margin-bottom:1.5rem;}
.org-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem;}
.org-logo{width:64px;height:64px;border-radius:16px;background:rgba(26,107,60,.1);display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0;}
.org-name{font-size:1rem;font-weight:600;color:var(--ink);margin-bottom:.2rem;}
.org-meta{font-size:.85rem;color:var(--muted);}
.job-title-main{font-family:'Syne',sans-serif;font-size:clamp(1.6rem,3vw,2.2rem);font-weight:800;line-height:1.2;margin-bottom:1rem;color:var(--ink);}
.job-pills{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1.2rem;}
.pill{display:inline-flex;align-items:center;gap:.3rem;padding:.35rem .8rem;border-radius:100px;font-size:.8rem;font-weight:600;}
.pill-gold{background:rgba(245,197,24,.15);color:#8a6d00;border:1px solid rgba(245,197,24,.4);}
.pill-teal{background:rgba(26,107,60,.1);color:var(--green);border:1px solid rgba(26,107,60,.2);}
.pill-gray{background:#F3F4F6;color:var(--muted);border:1px solid var(--border);}
.cefr-large{display:inline-flex;align-items:center;gap:.6rem;background:var(--gold);color:var(--forest);padding:.5rem 1rem;border-radius:10px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;}

/* CONTENT CARDS */
.content-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.8rem;margin-bottom:1.2rem;}
.content-card h3{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:1rem;color:var(--ink);padding-bottom:.6rem;border-bottom:2px solid var(--off);}
.body-text{font-size:.92rem;line-height:1.8;color:var(--body);white-space:pre-line;}
.detail-list{display:flex;flex-direction:column;gap:.8rem;}
.detail-item{display:flex;align-items:flex-start;gap:.8rem;font-size:.9rem;}
.detail-icon{width:32px;height:32px;border-radius:8px;background:rgba(26,107,60,.1);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
.detail-label{font-size:.75rem;color:var(--muted);margin-bottom:.1rem;}
.detail-value{font-weight:600;color:var(--ink);}

/* SIDEBAR */
.sidebar-card{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;position:sticky;top:86px;margin-bottom:1rem;}
.sidebar-card h4{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:1.2rem;}
.apply-btn{display:block;width:100%;text-align:center;background:var(--gold);color:var(--forest);padding:1rem;border-radius:12px;font-weight:700;font-size:1.05rem;text-decoration:none;transition:all .2s;margin-bottom:.8rem;}
.apply-btn:hover{background:#f7ce3a;transform:translateY(-2px);}
.save-btn{display:block;width:100%;text-align:center;background:transparent;color:var(--green);border:2px solid var(--green);padding:.85rem;border-radius:12px;font-weight:600;font-size:.95rem;text-decoration:none;transition:all .2s;margin-bottom:1.2rem;cursor:pointer;}
.save-btn:hover{background:rgba(26,107,60,.08);}
.sidebar-detail{display:flex;flex-direction:column;gap:.8rem;padding-top:1rem;border-top:1px solid var(--border);}
.sd-item{display:flex;justify-content:space-between;align-items:center;font-size:.85rem;}
.sd-label{color:var(--muted);}
.sd-value{font-weight:600;color:var(--ink);}
.deadline-warning{background:#FEF3CD;border:1px solid #FCD34D;border-radius:8px;padding:.7rem .9rem;font-size:.8rem;color:#92400E;margin-top:.8rem;display:flex;align-items:center;gap:.4rem;}

/* SIMILAR JOBS */
.similar-card{display:flex;flex-direction:column;gap:.8rem;}
.sim-job{background:var(--off);border:1px solid var(--border);border-radius:12px;padding:1rem;text-decoration:none;color:var(--ink);transition:all .2s;display:block;}
.sim-job:hover{border-color:var(--green);background:rgba(26,107,60,.05);}
.sim-title{font-weight:700;font-size:.88rem;color:var(--green);margin-bottom:.2rem;}
.sim-org{font-size:.78rem;color:var(--muted);}
.sim-meta{display:flex;align-items:center;gap:.4rem;margin-top:.4rem;flex-wrap:wrap;}

/* NOT FOUND */
.not-found{text-align:center;padding:6rem 2rem;max-width:480px;margin:0 auto;}
.not-found h2{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:700;margin-bottom:.8rem;}
.not-found p{color:var(--muted);margin-bottom:2rem;}

@keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
@media(max-width:900px){.page-wrap{grid-template-columns:1fr;}.sidebar-card{position:static;}}
/* NAV */
nav{height:auto}
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:.5rem 2rem}
.nav-logo{display:block}
.nav-links{display:flex;align-items:center;gap:1.8rem;font-size:.9rem;font-weight:500}
.nav-links a{color:var(--body);transition:color .15s}
.nav-links a:hover{color:var(--green)}
.ga-sm{font-size:.75rem;color:var(--muted);margin-left:.25rem}
.nav-links a.ghost{border:1.5px solid var(--border);border-radius:8px;padding:.4rem .9rem;color:var(--body)}
.nav-links a.ghost:hover{border-color:var(--green);color:var(--green)}
.nav-links a.cta{background:var(--gold);color:var(--forest);border-radius:8px;padding:.45rem 1.1rem;font-weight:700;transition:background .15s}
.nav-links a.cta:hover{background:#f7ce3a}
/* FOOTER */
footer{background:var(--ink);color:rgba(255,255,255,.6);padding:4rem 2rem 2rem}
.foot-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3rem;margin-bottom:3rem}
.foot-logo{margin-bottom:.9rem}
.foot-brand p{font-size:.85rem;line-height:1.7;max-width:260px;margin-bottom:.6rem}
.foot-brand .ga{font-size:.78rem;color:rgba(255,255,255,.3)}
footer h5{font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4);font-family:var(--mono);margin-bottom:1.1rem}
footer h5 .ga-sm{display:block;font-size:.65rem;text-transform:none;letter-spacing:0;margin-top:.2rem;color:rgba(255,255,255,.2)}
footer ul{list-style:none;display:flex;flex-direction:column;gap:.6rem}
footer ul a{font-size:.88rem;color:rgba(255,255,255,.55);transition:color .15s}
footer ul a:hover{color:var(--white)}
.foot-bottom{max-width:1200px;margin:0 auto;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.foot-bottom span{font-size:.8rem;color:rgba(255,255,255,.25)}
.foot-bottom .tag{font-size:.75rem;font-style:italic}
@media(max-width:1024px){.foot-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.nav{padding:.75rem 1rem}.nav-links{gap:1rem;font-size:.82rem}.foot-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">
    <img src="assets/poist-logo-trans.png" alt="poist.ie" style="height:70px; width:auto; display:block;">
  </a>
  <div class="nav-links">
    <a href="jobs.html">Browse Jobs <span class="ga-sm">/ Poist</span></a>
    <a href="employers.html">For Employers</a>
    <a href="cefr-guide.html">CEFR Guide</a>
    <a href="about.html">About</a>
    <a href="login.html" class="ghost">Log in</a>
    <a href="register-candidate.html" class="cta">Get Started</a>
  </div>
</nav>

<div class="page-wrap" id="pageWrap">
  <div id="mainCol">
    <div class="not-found">
      <div style="font-size:3rem;margin-bottom:1rem;">⏳</div>
      <h2>Loading role…</h2>
      <p>Fetching job details.</p>
    </div>
  </div>
  <div id="sideCol"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient('https://kpfshjarepmazrgzffot.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZnNoamFyZXBtYXpyZ3pmZm90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzQ0MjIsImV4cCI6MjA5MDY1MDQyMn0.yU-6ASii1duNXgGMs0ZWTkgTYXonVfqVOnEQr0J8FhU');

const cefrLabel = { A1:'Beginner', A2:'Elementary', B1:'Intermediate', B2:'Upper-Intermediate', C1:'Advanced', C2:'Proficient/Native' };

function cefrBadge(level, large=false){
  if(!level) return '';
  if(large) return `<div class="cefr-large">${level} <span style="font-size:0.8rem;font-weight:600;opacity:0.7;">${cefrLabel[level]||''}</span></div>`;
  return `<span style="background:#F5C518;color:#0F1A13;font-size:0.75rem;font-weight:700;padding:0.2rem 0.55rem;border-radius:5px;">${level}</span>`;
}

function toast(msg){
  const t=document.createElement('div');
  t.style.cssText=`position:fixed;bottom:1.5rem;right:1.5rem;background:#1A6B3C;color:#fff;padding:0.8rem 1.3rem;border-radius:10px;font-size:0.9rem;font-weight:500;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.2);animation:slideUp 0.3s ease;`;
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}

function daysAgo(ts){
  if(!ts) return '';
  const d=Math.floor((Date.now()-new Date(ts))/(1000*60*60*24));
  if(d===0) return 'Today'; if(d===1) return '1 day ago'; return `${d} days ago`;
}

function showNotFound(){
  document.getElementById('mainCol').innerHTML = `
    <div class="not-found">
      <div style="font-size:3rem;margin-bottom:1rem;">🔍</div>
      <h2>Role not found</h2>
      <p>This job may have been filled or the link may be incorrect.</p>
      <a href="jobs.html" style="display:inline-flex;align-items:center;gap:0.5rem;background:var(--green);color:#fff;padding:0.8rem 1.8rem;border-radius:10px;font-weight:600;text-decoration:none;">← Back to all jobs</a>
    </div>`;
  document.title = 'poist.ie — Job Not Found';
}

async function render(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if(!id){ showNotFound(); return; }

  const { data: row, error } = await sb.from('jobs').select('*').eq('id', id).eq('status','approved').single();
  if(error || !row){ showNotFound(); return; }

  const title = row.title || 'Untitled Role';
  const org = row.org_name || row.source_name || '—';
  const location = row.location || row.county || 'Ireland';
  const county = row.county || '';
  const sector = row.sector || '';
  const cefr = row.cefr_level || row.cefr || '';
  const jobType = row.job_type || row.type || '';
  const salary = row.salary || '';
  const closing = row.closing_date || '';
  const experience = row.experience || '';
  const desc = row.description || '';
  const isAggregated = !!row.is_aggregated;
  const sourceUrl = row.source_url || null;
  const sourceName = row.source_name || '';
  const posted = daysAgo(row.created_at);
  const responsibilities = Array.isArray(row.responsibilities) ? row.responsibilities : null;
  const requirements = Array.isArray(row.requirements) ? row.requirements : null;

  document.title = `${title} — ${org} | poist.ie`;

  // Fetch similar jobs (same sector, exclude current)
  let similar = [];
  if(sector){
    const { data: simData } = await sb.from('jobs').select('id,title,org_name,source_name,county,location,sector,cefr_level,cefr,job_type,type,created_at,source_url,is_aggregated')
      .eq('status','approved').eq('sector',sector).neq('id',id).limit(3);
    similar = simData || [];
  }

  const applyBtn = isAggregated && sourceUrl
    ? `<a href="${sourceUrl}" target="_blank" rel="noopener" class="apply-btn">View Original Listing →</a>`
    : `<a href="register-candidate.html" class="apply-btn">🎓 Apply Now — Free</a>`;

  const sectorPill = sector ? `<div class="pill pill-teal">${sector}</div>` : '';
  const typePill = jobType ? `<div class="pill pill-gray">${jobType}</div>` : '';
  const locationPill = location ? `<div class="pill pill-gray">📍 ${location}</div>` : '';

  const detailRows = [
    salary ? `<div class="detail-item"><div class="detail-icon">💰</div><div><div class="detail-label">Salary</div><div class="detail-value">${salary}</div></div></div>` : '',
    location ? `<div class="detail-item"><div class="detail-icon">📍</div><div><div class="detail-label">Location</div><div class="detail-value">${location}</div></div></div>` : '',
    jobType ? `<div class="detail-item"><div class="detail-icon">⏰</div><div><div class="detail-label">Contract Type</div><div class="detail-value">${jobType}</div></div></div>` : '',
    cefr ? `<div class="detail-item"><div class="detail-icon">🗣️</div><div><div class="detail-label">Irish Level Required</div><div class="detail-value">${cefr} — ${cefrLabel[cefr]||''}</div></div></div>` : '',
    experience ? `<div class="detail-item"><div class="detail-icon">🎓</div><div><div class="detail-label">Experience</div><div class="detail-value">${experience}</div></div></div>` : '',
    closing ? `<div class="detail-item"><div class="detail-icon">📅</div><div><div class="detail-label">Closing Date</div><div class="detail-value">${closing}</div></div></div>` : '',
    sector ? `<div class="detail-item"><div class="detail-icon">🏷️</div><div><div class="detail-label">Sector</div><div class="detail-value">${sector}</div></div></div>` : '',
  ].filter(Boolean).join('');

  const responsibilitiesHtml = responsibilities ? `
    <div class="content-card">
      <h3>Key Responsibilities</h3>
      <div style="display:flex;flex-direction:column;gap:0.7rem;">
        ${responsibilities.map(r=>`<div style="display:flex;gap:0.7rem;font-size:0.9rem;line-height:1.6;"><span style="color:var(--green);font-weight:700;flex-shrink:0;margin-top:0.05rem;">→</span><span>${r}</span></div>`).join('')}
      </div>
    </div>` : '';

  const requirementsHtml = requirements ? `
    <div class="content-card">
      <h3>Requirements</h3>
      <div style="display:flex;flex-direction:column;gap:0.7rem;">
        ${requirements.map((r,i)=>`<div style="display:flex;gap:0.7rem;font-size:0.9rem;line-height:1.6;${i===0?'background:rgba(245,197,24,0.08);border:1px solid rgba(245,197,24,0.3);border-radius:8px;padding:0.6rem 0.8rem;':''}"><span style="color:${i===0?'#8a6d00':'var(--green)'};font-weight:700;flex-shrink:0;margin-top:0.05rem;">${i===0?'🗣️':'✓'}</span><span>${r}</span></div>`).join('')}
      </div>
    </div>` : '';

  const sourceNote = isAggregated && sourceName ? `
    <div style="background:rgba(26,107,60,.06);border:1px solid rgba(26,107,60,.15);border-radius:10px;padding:.7rem 1rem;font-size:.82rem;color:var(--muted);margin-bottom:1.2rem;">
      📡 Aggregated from <strong>${sourceName}</strong> — view the original listing for full details and to apply.
    </div>` : '';

  const similarHtml = similar.length ? `
    <div class="content-card">
      <h3>Similar Roles</h3>
      <div class="similar-card">
        ${similar.map(s=>{
          const sOrg = s.org_name || s.source_name || '—';
          const sLoc = s.location || s.county || 'Ireland';
          const sCefr = s.cefr_level || s.cefr || '';
          const sType = s.job_type || s.type || '';
          const href = s.is_aggregated && s.source_url ? s.source_url : `job.html?id=${s.id}`;
          const target = s.is_aggregated && s.source_url ? ' target="_blank" rel="noopener"' : '';
          return `<a href="${href}"${target} class="sim-job">
            <div class="sim-title">${s.title||'Untitled'}</div>
            <div class="sim-org">${sOrg} · ${sLoc}</div>
            <div class="sim-meta">
              ${cefrBadge(sCefr)}
              ${sType ? `<span class="pill pill-gray" style="font-size:0.75rem;padding:0.2rem 0.6rem;">${sType}</span>` : ''}
              <span style="font-size:0.75rem;color:var(--muted);margin-left:auto;">${daysAgo(s.created_at)}</span>
            </div>
          </a>`;
        }).join('')}
      </div>
    </div>` : '';

  document.getElementById('mainCol').innerHTML = `
    <div class="breadcrumb">
      <a href="jobs.html">← Browse Jobs</a>
      ${sector ? `<span>/</span><span>${sector}</span>` : ''}
      <span>/</span>
      <span style="color:var(--dark);font-weight:500;">${title}</span>
    </div>
    ${sourceNote}
    <div class="job-header">
      <div class="org-row">
        <div class="org-logo">🏢</div>
        <div>
          <div class="org-name">${org}</div>
          <div class="org-meta">📍 ${location}${jobType ? ' &nbsp;·&nbsp; '+jobType : ''}${posted ? ' &nbsp;·&nbsp; Posted '+posted : ''}</div>
        </div>
      </div>
      <h1 class="job-title-main">${title}</h1>
      <div class="job-pills">
        ${cefrBadge(cefr, true)}
        ${sectorPill}${typePill}${locationPill}
      </div>
    </div>
    <div class="content-card">
      <h3>About the Role</h3>
      <p class="body-text">${desc || 'See original listing for full details.'}</p>
    </div>
    ${responsibilitiesHtml}
    ${requirementsHtml}
    ${detailRows ? `<div class="content-card"><h3>Role Details</h3><div class="detail-list">${detailRows}</div></div>` : ''}
    ${similarHtml}
  `;

  const sdItems = [
    cefr ? `<div class="sd-item"><span class="sd-label">Irish Level</span><span class="sd-value">${cefr}${cefrLabel[cefr]?' — '+cefrLabel[cefr]:''}</span></div>` : '',
    salary ? `<div class="sd-item"><span class="sd-label">Salary</span><span class="sd-value" style="text-align:right;max-width:180px;">${salary}</span></div>` : '',
    jobType ? `<div class="sd-item"><span class="sd-label">Type</span><span class="sd-value">${jobType}</span></div>` : '',
    sector ? `<div class="sd-item"><span class="sd-label">Sector</span><span class="sd-value">${sector}</span></div>` : '',
    location ? `<div class="sd-item"><span class="sd-label">Location</span><span class="sd-value">${location}</span></div>` : '',
    closing ? `<div class="sd-item"><span class="sd-label">Closing</span><span class="sd-value">${closing}</span></div>` : '',
  ].filter(Boolean).join('');

  document.getElementById('sideCol').innerHTML = `
    <div class="sidebar-card">
      <h4>${isAggregated ? 'View this role' : 'Apply for this role'}</h4>
      ${applyBtn}
      <button class="save-btn" onclick="window._toast('Role saved! Sign in to view saved jobs.')">🔖 Save Role</button>
      ${sdItems ? `<div class="sidebar-detail">${sdItems}</div>` : ''}
      ${closing ? `<div class="deadline-warning">⏰ Closes ${closing} — don't leave it late</div>` : ''}
    </div>
    ${!isAggregated ? `
    <div class="sidebar-card" style="background:var(--off);border-color:rgba(26,107,60,0.2);">
      <h4 style="color:var(--forest);">Not ready to apply yet?</h4>
      <p style="font-size:0.85rem;color:var(--muted);margin-bottom:1rem;line-height:1.6;">Create a free Language Passport and go passive — employers can find you without you applying.</p>
      <a href="register-candidate.html" style="display:block;text-align:center;background:var(--green);color:#fff;padding:0.7rem;border-radius:8px;font-weight:600;font-size:0.88rem;text-decoration:none;">Create Language Passport →</a>
    </div>` : ''}
    <div class="sidebar-card" style="background:var(--ink);border:none;">
      <h4 style="color:#fff;margin-bottom:0.5rem;">Share this role</h4>
      <p style="font-size:0.82rem;color:rgba(255,255,255,0.55);margin-bottom:1rem;">Know someone who'd be perfect?</p>
      <button onclick="window._copyLink()" style="width:100%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;padding:0.7rem;border-radius:8px;font-weight:600;font-size:0.85rem;cursor:pointer;">🔗 Copy Link</button>
    </div>
  `;
}

window._toast = toast;
window._copyLink = function(){ navigator.clipboard.writeText(window.location.href).then(()=>toast('Link copied!')).catch(()=>toast('Copy failed — try manually')); };

render();
</script>
</body>
</html>
