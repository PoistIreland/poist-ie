<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>poist.ie — Find Candidates</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>/* poist.ie base styles — shared across all pages */
:root {
  --teal:#1A7A6E;--teal-dark:#0f5a51;--teal-light:#E8F5F3;--teal-mid:#2a9d8f;
  --gold:#F5C518;--gold-dark:#d4a800;
  --dark:#1A1A2E;--gray:#6B7280;--cream:#F5F2ED;--border:#E5E7EB;--white:#ffffff;
  --red:#dc2626;--green:#16a34a;
  --sidebar-w:220px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#F5F2ED;color:var(--dark);overflow-x:hidden;}
input,select,textarea{font-family:'DM Sans',sans-serif;}
.logo{text-decoration:none;font-family:'DM Sans',sans-serif;font-weight:700;font-size:1.65rem;letter-spacing:-0.03em;background:linear-gradient(90deg,#0f5a51,#2a9d8f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* Layout */
.app-shell{display:flex;min-height:100vh;}
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.page-content{flex:1;overflow-y:auto;padding:1.5rem;}

/* Cards */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.4rem;}
.card-sm{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:1rem;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.6rem 1.2rem;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;border:none;transition:all 0.18s;text-decoration:none;}
.btn-primary{background:var(--gold);color:var(--dark);}
.btn-primary:hover{background:var(--gold-dark);transform:translateY(-1px);}
.btn-teal{background:var(--teal);color:#fff;}
.btn-teal:hover{background:var(--teal-dark);}
.btn-outline{background:transparent;border:1.5px solid var(--teal);color:var(--teal);}
.btn-outline:hover{background:var(--teal-light);}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--gray);}
.btn-ghost:hover{border-color:var(--dark);color:var(--dark);}
.btn-danger{background:#fef2f2;border:1.5px solid #fecaca;color:var(--red);}
.btn-danger:hover{background:#fee2e2;}
.btn-lg{padding:0.8rem 1.8rem;font-size:1rem;border-radius:10px;}

/* Form elements */
.form-group{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem;}
.form-label{font-size:0.85rem;font-weight:600;color:var(--dark);}
.form-input{padding:0.65rem 0.9rem;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;color:var(--dark);background:var(--white);transition:border-color 0.18s;outline:none;}
.form-input:focus{border-color:var(--teal);}
.form-input.error{border-color:var(--red);}
.form-hint{font-size:0.78rem;color:var(--gray);}
.form-error{font-size:0.78rem;color:var(--red);}
select.form-input{cursor:pointer;}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:0.18rem 0.55rem;border-radius:4px;font-size:0.72rem;font-weight:700;}
.badge-gold{background:var(--gold);color:var(--dark);}
.badge-teal{background:var(--teal-light);color:var(--teal);}
.badge-gray{background:#F3F4F6;color:var(--gray);}
.badge-green{background:#dcfce7;color:var(--green);}
.badge-red{background:#fef2f2;color:var(--red);}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.2rem;}
.stat-num{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--teal);}
.stat-label{font-size:0.78rem;color:var(--gray);margin-top:0.15rem;}

/* CEFR scale */
.cefr-scale{display:flex;gap:3px;}
.cefr-pip{flex:1;height:6px;border-radius:3px;background:#E5E7EB;}
.cefr-pip.on{background:var(--gold);}

/* Section header */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.section-hdr h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;}

/* Verified badge */
.verified{display:inline-flex;align-items:center;gap:0.3rem;background:#E8F5F3;color:var(--teal);font-size:0.72rem;font-weight:600;padding:0.18rem 0.55rem;border-radius:4px;}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.fade-in{animation:fadeIn 0.3s ease both;}

/* Public nav */
.pub-nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;height:66px;display:flex;align-items:center;justify-content:space-between;}
.pub-nav-links{display:flex;align-items:center;gap:1.8rem;}
.pub-nav-links a{text-decoration:none;color:var(--gray);font-weight:500;font-size:0.93rem;transition:color 0.2s;}
.pub-nav-links a:hover{color:var(--teal);}
.pub-nav-cta{background:var(--gold);color:var(--dark)!important;padding:0.5rem 1.2rem;border-radius:7px;font-weight:600;font-size:0.88rem;}
.pub-nav-cta:hover{background:var(--gold-dark)!important;}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .pub-nav-links{display:none;}
}

.cand-card{border:1px solid var(--border);border-radius:10px;padding:1rem;cursor:pointer;transition:all .18s;background:var(--white);}.cand-card:hover,.cand-card.active{border-color:var(--teal);background:var(--teal-light);}#map{height:100%;}</style>
</head>
<body>
<div class="app-shell" id="shell"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

// poist.ie shared utilities
// Replace localStorage calls with Supabase auth/db calls when going live

const POIST = {
  // ── Brand ──────────────────────────────────────────
  logo: (dark = false) => `
    <a href="index.html" style="text-decoration:none;font-family:'DM Sans',sans-serif;font-weight:700;font-size:1.65rem;letter-spacing:-0.03em;background:linear-gradient(90deg,${dark?'rgba(255,255,255,0.9),rgba(255,255,255,0.6)':'#0f5a51,#2a9d8f'});-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">poist.ie</a>`,

  // ── Auth helpers (swap for Supabase auth) ──────────
  getUser: () => JSON.parse(localStorage.getItem('poist_user') || 'null'),
  setUser: (u) => localStorage.setItem('poist_user', JSON.stringify(u)),
  logout: () => { localStorage.removeItem('poist_user'); window.location.href = 'login.html'; },
  requireAuth: (role) => {
    const u = POIST.getUser();
    if (!u) { window.location.href = 'login.html'; return null; }
    if (role && u.role !== role) { window.location.href = 'index.html'; return null; }
    return u;
  },

  // ── CEFR helpers ───────────────────────────────────
  cefrLevels: ['A1','A2','B1','B2','C1','C2'],
  cefrLabel: { A1:'Beginner',A2:'Elementary',B1:'Intermediate',B2:'Upper-Intermediate',C1:'Advanced',C2:'Proficient/Native' },

  // ── Demo seed data (replace with Supabase queries) ─
  demoJobs: [
    { id:1, title:'Irish Language Officer', org:'Department of Education', location:'Dublin', county:'Dublin', type:'Full-time', cefr:'B2', sector:'Government', posted:'2 days ago', lat:53.349, lng:-6.260, desc:'Lead Irish language strategy across the department, supporting the 2030 Official Languages Act targets.' },
    { id:2, title:'Bainisteoir Tionscadail', org:'Údarás na Gaeltachta', location:'Galway', county:'Galway', type:'Full-time', cefr:'C1', sector:'Semi-state', posted:'1 day ago', lat:53.270, lng:-9.056, desc:'Manage capital projects across Gaeltacht regions. Full Irish essential.' },
    { id:3, title:'Irish Language Teacher', org:'Coláiste Íde', location:'Dingle, Kerry', county:'Kerry', type:'Full-time', cefr:'C2', sector:'Education', posted:'3 days ago', lat:52.141, lng:-10.267, desc:'Teach Irish at secondary level at a leading Irish-medium college.' },
    { id:4, title:'Communications Officer (Irish)', org:'HSE', location:'Cork', county:'Cork', type:'Full-time', cefr:'B2', sector:'Healthcare', posted:'Today', lat:51.898, lng:-8.475, desc:'Produce Irish-language health communications for HSE Cork region.' },
    { id:5, title:'Tech Lead Gaeilge', org:'GlobalTech Ireland', location:'Cork', county:'Cork', type:'Full-time', cefr:'B1', sector:'Technology', posted:'5 days ago', lat:51.903, lng:-8.468, desc:'Lead a bilingual engineering team. Irish language skills valued but not essential at native level.' },
    { id:6, title:'Content Creator', org:'TG4', location:'Galway', county:'Galway', type:'Contract', cefr:'C1', sector:'Media', posted:'Today', lat:53.274, lng:-9.049, desc:'Create engaging Irish-language video content for TG4 digital platforms.' },
    { id:7, title:'Irish Language Coordinator', org:'Limerick City Council', location:'Limerick', county:'Limerick', type:'Part-time', cefr:'B1', sector:'Government', posted:'1 week ago', lat:52.664, lng:-8.630, desc:'Coordinate Irish language services for Limerick City Council.' },
    { id:8, title:'Community Manager', org:'Conradh na Gaeilge', location:'Dublin', county:'Dublin', type:'Full-time', cefr:'C2', sector:'Non-profit', posted:'4 days ago', lat:53.342, lng:-6.268, desc:'Manage community programmes and events promoting the Irish language.' },
  ],

  demoCandidates: [
    { id:1, name:'Síle Ní Bhriain', title:'Content Creator', location:'Galway', cefr:'B2', englishCefr:'C2', skills:['Content Writing','Public Speaking','Media Production'], available:'Passive', verified:true, avatar:'👩‍💼' },
    { id:2, name:'Ciarán Mac Giolla', title:'Software Developer', location:'Dublin', cefr:'C1', englishCefr:'C2', skills:['React','Node.js','Irish Language Tech'], available:'Active', verified:true, avatar:'👨‍💻' },
    { id:3, name:'Aoife Ní Fhaoláin', title:'Irish Language Officer', location:'Galway', cefr:'C2', englishCefr:'C2', skills:['Policy','Training','Communications'], available:'Passive', verified:true, avatar:'👩‍🏫' },
    { id:4, name:'Seán Ó Briain', title:'Communications Manager', location:'Cork', cefr:'B2', englishCefr:'C1', skills:['PR','Social Media','Copywriting'], available:'Active', verified:false, avatar:'👨‍💼' },
  ],

  // ── Sidebar nav renderer ────────────────────────────
  renderSidebar: (role, activePage) => {
    const candidateLinks = [
      { href:'candidate-dashboard.html', icon:'⊞', label:'Dashboard' },
      { href:'candidate-jobs.html', icon:'🔍', label:'Find Jobs' },
      { href:'candidate-passport.html', icon:'📋', label:'My Passport' },
    ];
    const employerLinks = [
      { href:'employer-dashboard.html', icon:'⊞', label:'Dashboard' },
      { href:'employer-search.html', icon:'🔍', label:'Find Candidates' },
      { href:'employer-post-job.html', icon:'＋', label:'Post a Job' },
    ];
    const adminLinks = [
      { href:'admin-dashboard.html', icon:'⊞', label:'Overview' },
      { href:'admin-dashboard.html#jobs', icon:'📋', label:'Job Approvals' },
      { href:'admin-dashboard.html#users', icon:'👥', label:'Users' },
    ];
    const links = role==='employer' ? employerLinks : role==='admin' ? adminLinks : candidateLinks;
    return `
      <aside style="width:220px;min-height:100vh;background:#0f5a51;display:flex;flex-direction:column;flex-shrink:0;">
        <div style="padding:1.4rem 1.2rem 1rem;border-bottom:1px solid rgba(255,255,255,0.1);">
          ${POIST.logo(true)}
        </div>
        <nav style="padding:0.8rem 0;flex:1;">
          ${links.map(l=>`
            <a href="${l.href}" style="display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.2rem;text-decoration:none;font-size:0.92rem;font-weight:500;border-radius:0;transition:background 0.15s;${activePage===l.href?'background:rgba(255,255,255,0.15);color:#fff;':'color:rgba(255,255,255,0.7);'}"
               onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='${activePage===l.href?'rgba(255,255,255,0.15)':'transparent'}'">
              <span style="font-size:1rem;width:20px;text-align:center;">${l.icon}</span>${l.label}
            </a>`).join('')}
        </nav>
        <div style="padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,0.1);">
          <button onclick="POIST.logout()" style="background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.7);padding:0.5rem 1rem;border-radius:6px;cursor:pointer;font-size:0.85rem;width:100%;text-align:left;">← Sign out</button>
        </div>
      </aside>`;
  },

  // ── Top bar for dashboards ──────────────────────────
  renderTopBar: (title, user) => `
    <div style="height:60px;background:#fff;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;flex-shrink:0;">
      <h1 style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;color:#1A1A2E;">${title}</h1>
      <div style="display:flex;align-items:center;gap:0.8rem;">
        <div style="width:32px;height:32px;border-radius:50%;background:#E8F5F3;display:flex;align-items:center;justify-content:center;font-size:1.1rem;">${user?.avatar||'👤'}</div>
        <span style="font-size:0.88rem;font-weight:500;color:#374151;">${user?.name||'User'}</span>
      </div>
    </div>`,

  // ── CEFR badge ─────────────────────────────────────
  cefrBadge: (level) => `<span style="background:#F5C518;color:#1A1A2E;font-size:0.7rem;font-weight:700;padding:0.18rem 0.5rem;border-radius:4px;">${level}</span>`,

  // ── Toast notification ──────────────────────────────
  toast: (msg, type='success') => {
    const t = document.createElement('div');
    const bg = type==='success'?'#1A7A6E':type==='error'?'#dc2626':'#1A1A2E';
    t.style.cssText=`position:fixed;bottom:1.5rem;right:1.5rem;background:${bg};color:#fff;padding:0.8rem 1.3rem;border-radius:10px;font-size:0.9rem;font-weight:500;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.2);animation:slideIn 0.3s ease;`;
    t.textContent=msg;
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),3000);
  },
};

// Demo login shortcut — remove when Supabase auth is live
window.POIST = POIST;

const _demo={candidate:{role:'candidate',name:'Síle Ní Bhriain',email:'sile@poist.ie',avatar:'👩\u200d💼',irishCefr:'B2',englishCefr:'C2',county:'Galway',jobTitle:'Content Creator',profileType:'active',skills:['Content Writing','Public Speaking','Media Production']},employer:{role:'employer',name:'Galway County Council',email:'hr@galway.ie',avatar:'🏛️',orgType:'Local authority',county:'Galway'},admin:{role:'admin',name:'Admin User',email:'admin@poist.ie',avatar:'⚙️'}};
function getUser(role){let u=POIST.getUser();if(!u||(role&&u.role!==role)){u=_demo[role||'candidate'];POIST.setUser(u);}return u;}


const user=getUser('employer');
const extC=[...POIST.demoCandidates.map(c=>({...c,hasSpeakingClip:c.id<=2,speakingPrompt:'Cur síos ar mo chuid Gaeilge agus mo chuid oibre'})),{id:5,hasSpeakingClip:true,speakingPrompt:'Míniú ar phost agus ar fhostóirí',name:'Pádraig Ó Mainnín',title:'Policy Analyst',location:'Limerick',cefr:'B1',englishCefr:'C1',skills:['Policy','Research'],available:'Active',verified:true,avatar:'👨\u200d💼',lat:52.664,lng:-8.630},{id:6,hasSpeakingClip:true,speakingPrompt:'Ról na Gaeilge sa saol comhaimseartha',name:'Máire Ní Cheallaigh',title:'Broadcaster',location:'Galway',cefr:'C2',englishCefr:'C2',skills:['Broadcasting','Presenting'],available:'Passive',verified:true,avatar:'👩\u200d🎤',lat:53.274,lng:-9.049}];
extC[0].lat=53.270;extC[0].lng=-9.056;extC[1].lat=53.349;extC[1].lng=-6.260;extC[2].lat=53.274;extC[2].lng=-9.049;extC[3].lat=51.898;extC[3].lng=-8.475;
let actC=null;
document.getElementById('shell').innerHTML=`
  ${POIST.renderSidebar('employer','employer-search.html')}
  <div class="main-area">
    ${POIST.renderTopBar('Find Candidates',user)}
    <div class="page-content" style="padding:0;display:flex;flex-direction:column;height:calc(100vh - 60px);">
      <div style="padding:.8rem 1.2rem;background:var(--white);border-bottom:1px solid var(--border);display:flex;gap:.7rem;flex-wrap:wrap;flex-shrink:0;">
        <input type="text" id="sQ" class="form-input" placeholder="Search by name, title, skills…" style="flex:1;min-width:160px;" oninput="filt()">
        <select class="form-input" style="width:auto;" id="sCefr" onchange="filt()"><option value="">All CEFR</option>${POIST.cefrLevels.map(l=>`<option value="${l}">${l}+</option>`).join('')}</select>
        <select class="form-input" style="width:auto;" id="sAvail" onchange="filt()"><option value="">All</option><option value="Active">Active</option><option value="Passive">Passive</option></select>
        <select class="form-input" style="width:auto;" id="sVerif" onchange="filt()"><option value="">All</option><option value="true">Verified only</option></select>
      </div>
      <div style="display:grid;grid-template-columns:350px 1fr;flex:1;overflow:hidden;">
        <div style="overflow-y:auto;padding:.8rem;display:flex;flex-direction:column;gap:.6rem;border-right:1px solid var(--border);">
          <div id="rCnt" style="font-size:.78rem;font-weight:600;color:var(--gray);">Loading…</div>
          <div id="cList"></div>
        </div>
        <div style="position:relative;"><div id="map" style="height:100%;"></div>
          <div id="cDetail" style="display:none;position:absolute;top:1rem;right:1rem;width:290px;background:var(--white);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.15);padding:1.2rem;z-index:1000;">
            <button onclick="closeD()" style="position:absolute;top:.7rem;right:.7rem;background:none;border:none;cursor:pointer;font-size:1.1rem;color:var(--gray);">×</button>
            <div id="cDContent"></div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
const map=L.map('map').setView([53.4,-8.0],7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(map);
const ti=L.divIcon({html:`<div style="background:#1A7A6E;width:14px;height:14px;border-radius:50%;border:2px solid #0f5a51;box-shadow:0 2px 6px rgba(0,0,0,.3);"></div>`,className:'',iconSize:[14,14]});
const ai2=L.divIcon({html:`<div style="background:#F5C518;width:18px;height:18px;border-radius:50%;border:2px solid #d4a800;box-shadow:0 2px 8px rgba(245,197,24,.5);"></div>`,className:'',iconSize:[18,18]});
let mk2={};
extC.forEach(c=>{if(!c.lat)return;const m=L.marker([c.lat,c.lng],{icon:ti}).addTo(map);m.on('click',()=>showC(c));mk2[c.id]=m;});
window.filt=()=>{const q=document.getElementById('sQ').value.toLowerCase(),cv=document.getElementById('sCefr').value,av=document.getElementById('sAvail').value,vv=document.getElementById('sVerif').value;const r=extC.filter(c=>(!q||c.name.toLowerCase().includes(q)||c.title.toLowerCase().includes(q)||c.skills.some(s=>s.toLowerCase().includes(q)))&&(!cv||POIST.cefrLevels.indexOf(c.cefr)>=POIST.cefrLevels.indexOf(cv))&&(!av||c.available===av)&&(!vv||String(c.verified)===vv));document.getElementById('rCnt').textContent=`${r.length} candidates`;renderL(r);};
function renderL(cands){document.getElementById('cList').innerHTML=cands.map(c=>`<div class="cand-card ${actC===c.id?'active':''}" onclick="showC(extC.find(x=>x.id===${c.id}))"><div style="display:flex;align-items:center;gap:.7rem;"><div style="width:36px;height:36px;border-radius:50%;background:var(--teal-light);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;">${c.avatar}</div><div style="flex:1;min-width:0;"><div style="font-weight:600;font-size:.88rem;">${c.name}${c.verified?' <span class="verified">✓</span>':''}</div><div style="font-size:.78rem;color:var(--gray);">${c.title} · ${c.location}</div></div>${POIST.cefrBadge(c.cefr)}</div><div style="display:flex;gap:.3rem;margin-top:.5rem;flex-wrap:wrap;">${c.skills.slice(0,2).map(s=>`<span class="badge badge-teal" style="font-size:.68rem;">${s}</span>`).join('')}<span class="badge badge-gray" style="font-size:.68rem;">${c.available}</span></div></div>`).join('');}
window.showC=(c)=>{actC=c.id;if(c.lat)map.setView([c.lat,c.lng],11);Object.values(mk2).forEach(m=>m.setIcon(ti));if(mk2[c.id])mk2[c.id].setIcon(ai2);document.getElementById('cDetail').style.display='block';document.getElementById('cDContent').innerHTML=`<div style="display:flex;align-items:center;gap:.7rem;margin-bottom:.8rem;padding-right:1.2rem;"><div style="width:42px;height:42px;border-radius:50%;background:var(--teal-light);display:flex;align-items:center;justify-content:center;font-size:1.3rem;">${c.avatar}</div><div><div style="font-weight:700;">${c.name}${c.verified?' <span class="verified">✓</span>':''}</div><div style="font-size:.8rem;color:var(--gray);">${c.title} · ${c.location}</div></div></div><div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.8rem;">${POIST.cefrBadge(c.cefr)}<span class="badge badge-gray">${c.available}</span></div><div style="background:linear-gradient(145deg,var(--teal-dark),var(--teal));border-radius:8px;padding:.8rem;margin-bottom:.8rem;color:#fff;"><div style="font-size:.68rem;opacity:.6;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;">Language Passport</div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem;font-size:.82rem;font-weight:600;">Irish <span style="background:var(--gold);color:var(--dark);padding:.1rem .4rem;border-radius:4px;font-size:.68rem;">${c.cefr}</span></div><div class="cefr-scale">${POIST.cefrLevels.map(l=>`<div class="cefr-pip ${POIST.cefrLevels.indexOf(l)<=POIST.cefrLevels.indexOf(c.cefr)?'on':''}"></div>`).join('')}</div></div><div style="display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.8rem;">${c.skills.map(s=>`<span class="badge badge-teal">${s}</span>`).join('')}</div><button class="btn btn-primary btn-lg" style="width:100%;justify-content:center;" onclick="POIST.toast('Message sent to ${c.name}!');closeD();">Contact Candidate →</button><div style="margin-top:0.6rem;font-size:0.75rem;color:var(--gray);text-align:center;">🎤 Speaking sample available on full profile</div>`;renderL(extC);};
window.closeD=()=>{document.getElementById('cDetail').style.display='none';actC=null;};
filt();

</script>
