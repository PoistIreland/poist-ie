<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>poist.ie — Find Candidates</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --teal:#1A7A6E;--teal-dark:#0f5a51;--teal-light:#E8F5F3;--teal-mid:#2a9d8f;
  --gold:#F5C518;--gold-dark:#d4a800;
  --dark:#1A1A2E;--gray:#6B7280;--cream:#F5F2ED;--border:#E5E7EB;--white:#ffffff;
  --red:#dc2626;--green:#16a34a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#F5F2ED;color:var(--dark);overflow-x:hidden;}
input,select,textarea{font-family:'DM Sans',sans-serif;}
.app-shell{display:flex;min-height:100vh;}
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.6rem 1.2rem;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;border:none;transition:all 0.18s;text-decoration:none;}
.btn-primary{background:var(--gold);color:var(--dark);}
.btn-primary:hover{background:var(--gold-dark);transform:translateY(-1px);}
.btn-teal{background:var(--teal);color:#fff;}
.btn-lg{padding:0.8rem 1.8rem;font-size:1rem;border-radius:10px;}
.form-input{padding:0.65rem 0.9rem;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;color:var(--dark);background:var(--white);transition:border-color 0.18s;outline:none;}
.form-input:focus{border-color:var(--teal);}
select.form-input{cursor:pointer;}
.badge{display:inline-flex;align-items:center;padding:0.18rem 0.55rem;border-radius:4px;font-size:0.72rem;font-weight:700;}
.badge-teal{background:var(--teal-light);color:var(--teal);}
.badge-gray{background:#F3F4F6;color:var(--gray);}
.badge-green{background:#dcfce7;color:var(--green);}
.verified{display:inline-flex;align-items:center;gap:0.3rem;background:#E8F5F3;color:var(--teal);font-size:0.72rem;font-weight:600;padding:0.18rem 0.55rem;border-radius:4px;}
.cefr-scale{display:flex;gap:3px;}
.cefr-pip{flex:1;height:6px;border-radius:3px;background:#E5E7EB;}
.cefr-pip.on{background:var(--gold);}
.cand-card{border:1px solid var(--border);border-radius:10px;padding:1rem;cursor:pointer;transition:all .18s;background:var(--white);}
.cand-card:hover,.cand-card.active{border-color:var(--teal);background:var(--teal-light);}
#map{height:100%;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.fade-in{animation:fadeIn 0.3s ease both;}
#loading-screen{position:fixed;inset:0;background:var(--cream);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:1rem;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* County coordinates for map pins */
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <span style="font-size:0.9rem;color:var(--gray);">Loading candidates…</span>
</div>

<div class="app-shell" id="shell" style="display:none;"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://kpfshjarepmazrgzffot.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZnNoamFyZXBtYXpyZ3pmZm90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDM2MDI1NTUsImV4cCI6MjA1OTE3ODU1NX0.pjCXFhFHMl0A5XFM1KGQdEBQ_WmFAz_of0VdvXfJ_5k';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

const LEVELS = ['A1','A2','B1','B2','C1','C2'];

// County → approximate lat/lng for map pins
const COUNTY_COORDS = {
  'Antrim':    [54.720, -6.207], 'Armagh':   [54.350, -6.653],
  'Carlow':    [52.836, -6.926], 'Cavan':    [53.990, -7.360],
  'Clare':     [52.900, -8.981], 'Cork':     [51.898, -8.475],
  'Derry':     [54.997, -7.309], 'Donegal':  [54.654, -8.110],
  'Down':      [54.323, -5.933], 'Dublin':   [53.349, -6.260],
  'Fermanagh': [54.344, -7.629], 'Galway':   [53.270, -9.056],
  'Kerry':     [52.156, -9.566], 'Kildare':  [53.160, -6.909],
  'Kilkenny':  [52.654, -7.252], 'Laois':    [52.994, -7.332],
  'Leitrim':   [54.124, -8.002], 'Limerick': [52.664, -8.630],
  'Longford':  [53.727, -7.793], 'Louth':    [53.923, -6.486],
  'Mayo':      [53.846, -9.302], 'Meath':    [53.605, -6.656],
  'Monaghan':  [54.249, -6.968], 'Offaly':   [53.274, -7.494],
  'Roscommon': [53.632, -8.189], 'Sligo':    [54.269, -8.469],
  'Tipperary': [52.473, -8.162], 'Tyrone':   [54.596, -7.296],
  'Waterford': [52.259, -7.110], 'Westmeath':[53.534, -7.465],
  'Wexford':   [52.337, -6.463], 'Wicklow':  [52.980, -6.044],
};

// ── UI helpers ─────────────────────────────────────────
const logo = (dark=false) => `<a href="index.html" style="text-decoration:none;font-family:'DM Sans',sans-serif;font-weight:700;font-size:1.65rem;letter-spacing:-0.03em;background:linear-gradient(90deg,${dark?'rgba(255,255,255,0.9),rgba(255,255,255,0.6)':'#0f5a51,#2a9d8f'});-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">poist.ie</a>`;

const cefrBadge = (level) => `<span style="background:#F5C518;color:#1A1A2E;font-size:0.7rem;font-weight:700;padding:0.18rem 0.5rem;border-radius:4px;">${level||'—'}</span>`;

const toast = (msg, type='success') => {
  const el = document.createElement('div');
  const bg = type==='success'?'#1A7A6E':type==='error'?'#dc2626':'#1A1A2E';
  el.style.cssText = `position:fixed;bottom:1.5rem;right:1.5rem;background:${bg};color:#fff;padding:0.8rem 1.3rem;border-radius:10px;font-size:0.9rem;font-weight:500;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.2);animation:slideIn 0.3s ease;`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
};

const sidebar = () => `
  <aside style="width:220px;min-height:100vh;background:#0f5a51;display:flex;flex-direction:column;flex-shrink:0;">
    <div style="padding:1.4rem 1.2rem 1rem;border-bottom:1px solid rgba(255,255,255,0.1);">${logo(true)}</div>
    <nav style="padding:0.8rem 0;flex:1;">
      ${[
        {href:'employer-dashboard.html',icon:'⊞',label:'Dashboard'},
        {href:'employer-search.html',icon:'🔍',label:'Find Candidates',active:true},
        {href:'employer-post-job.html',icon:'＋',label:'Post a Job'},
      ].map(l=>`
        <a href="${l.href}" style="display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.2rem;text-decoration:none;font-size:0.92rem;font-weight:500;transition:background 0.15s;${l.active?'background:rgba(255,255,255,0.15);color:#fff;':'color:rgba(255,255,255,0.7);'}"
           onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='${l.active?'rgba(255,255,255,0.15)':'transparent'}'">
          <span style="font-size:1rem;width:20px;text-align:center;">${l.icon}</span>${l.label}
        </a>`).join('')}
    </nav>
    <div style="padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,0.1);">
      <button id="signout-btn" style="background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.7);padding:0.5rem 1rem;border-radius:6px;cursor:pointer;font-size:0.85rem;width:100%;text-align:left;">← Sign out</button>
    </div>
  </aside>`;

// ── State ──────────────────────────────────────────────
let allCandidates = [];   // full set from Supabase
let filtered = [];        // currently shown
let activeId = null;
let markers = {};
let map = null;

const iconDefault = L.divIcon({
  html: `<div style="background:#1A7A6E;width:14px;height:14px;border-radius:50%;border:2px solid #0f5a51;box-shadow:0 2px 6px rgba(0,0,0,.3);"></div>`,
  className: '', iconSize: [14,14]
});
const iconActive = L.divIcon({
  html: `<div style="background:#F5C518;width:18px;height:18px;border-radius:50%;border:2px solid #d4a800;box-shadow:0 2px 8px rgba(245,197,24,.5);"></div>`,
  className: '', iconSize: [18,18]
});

// ── Filter + render ────────────────────────────────────
function applyFilters() {
  const q    = document.getElementById('sQ').value.toLowerCase();
  const cefr = document.getElementById('sCefr').value;
  const avail = document.getElementById('sAvail').value;
  const verif = document.getElementById('sVerif').value;

  filtered = allCandidates.filter(c => {
    const skills = c.skills || [];
    const matchQ = !q ||
      (c.full_name||'').toLowerCase().includes(q) ||
      (c.profile_type||'').toLowerCase().includes(q) ||
      skills.some(s => s.toLowerCase().includes(q));
    const matchCefr = !cefr ||
      LEVELS.indexOf(c.cefr_level) >= LEVELS.indexOf(cefr);
    const matchAvail = !avail || c.profile_type === avail;
    const matchVerif = !verif || (verif === 'true' && c.verified);
    return matchQ && matchCefr && matchAvail && matchVerif;
  });

  document.getElementById('rCnt').textContent =
    `${filtered.length} candidate${filtered.length !== 1 ? 's' : ''}`;
  renderList(filtered);
  updateMapPins(filtered);
}

function renderList(candidates) {
  if (candidates.length === 0) {
    document.getElementById('cList').innerHTML = `
      <div style="text-align:center;padding:2rem 1rem;color:var(--gray);">
        <div style="font-size:2rem;margin-bottom:.5rem;">🔍</div>
        <div style="font-size:.9rem;">No candidates match your filters</div>
      </div>`;
    return;
  }

  document.getElementById('cList').innerHTML = candidates.map(c => `
    <div class="cand-card ${activeId === c.id ? 'active' : ''}" data-id="${c.id}">
      <div style="display:flex;align-items:center;gap:.7rem;">
        <div style="width:36px;height:36px;border-radius:50%;background:var(--teal-light);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;">👤</div>
        <div style="flex:1;min-width:0;">
          <div style="font-weight:600;font-size:.88rem;">
            ${c.full_name||'Anonymous'}
            ${c.verified ? '<span class="verified">✓ Verified</span>' : ''}
          </div>
          <div style="font-size:.78rem;color:var(--gray);">${c.profile_type||'Candidate'} · ${c.county||'Ireland'}</div>
        </div>
        ${cefrBadge(c.cefr_level)}
      </div>
      <div style="display:flex;gap:.3rem;margin-top:.5rem;flex-wrap:wrap;">
        ${(c.skills||[]).slice(0,2).map(s => `<span class="badge badge-teal" style="font-size:.68rem;">${s}</span>`).join('')}
        ${c.assessment_completed ? '<span class="badge badge-green" style="font-size:.68rem;">✓ Assessed</span>' : ''}
      </div>
    </div>`).join('');

  // Bind click handlers
  document.querySelectorAll('.cand-card[data-id]').forEach(card => {
    card.addEventListener('click', () => {
      const c = allCandidates.find(x => x.id === card.dataset.id);
      if (c) showCandidate(c);
    });
  });
}

function updateMapPins(candidates) {
  // Remove all existing markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  candidates.forEach(c => {
    const coords = COUNTY_COORDS[c.county];
    if (!coords) return;
    // Add small jitter so pins in same county don't stack
    const lat = coords[0] + (Math.random() - 0.5) * 0.08;
    const lng = coords[1] + (Math.random() - 0.5) * 0.08;
    const m = L.marker([lat, lng], { icon: activeId === c.id ? iconActive : iconDefault }).addTo(map);
    m.on('click', () => showCandidate(c));
    markers[c.id] = { marker: m, lat, lng };
  });
}

function showCandidate(c) {
  activeId = c.id;

  // Update map
  Object.values(markers).forEach(({ marker }) => marker.setIcon(iconDefault));
  if (markers[c.id]) {
    markers[c.id].marker.setIcon(iconActive);
    map.setView([markers[c.id].lat, markers[c.id].lng], 10);
  }

  // Re-render list to update active state
  renderList(filtered);

  // Show detail panel
  const panel = document.getElementById('cDetail');
  panel.style.display = 'block';
  document.getElementById('cDContent').innerHTML = `
    <div style="display:flex;align-items:center;gap:.7rem;margin-bottom:.8rem;padding-right:1.2rem;">
      <div style="width:42px;height:42px;border-radius:50%;background:var(--teal-light);display:flex;align-items:center;justify-content:center;font-size:1.3rem;">👤</div>
      <div>
        <div style="font-weight:700;">${c.full_name||'Anonymous'}${c.verified?' <span class="verified">✓</span>':''}</div>
        <div style="font-size:.8rem;color:var(--gray);">${c.profile_type||'Candidate'} · ${c.county||'Ireland'}</div>
      </div>
    </div>

    <div style="display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:.8rem;">
      ${cefrBadge(c.cefr_level)}
      ${c.assessment_completed ? '<span class="badge badge-green">✓ Assessed</span>' : ''}
      ${c.verified ? '<span class="badge" style="background:#E8F5F3;color:var(--teal);">✓ Verified</span>' : ''}
    </div>

    <!-- Language Passport mini -->
    <div style="background:linear-gradient(145deg,var(--teal-dark),var(--teal));border-radius:8px;padding:.8rem;margin-bottom:.8rem;color:#fff;">
      <div style="font-size:.68rem;opacity:.6;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem;">Language Passport</div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.3rem;font-size:.82rem;font-weight:600;">
        Irish
        <span style="background:var(--gold);color:var(--dark);padding:.1rem .4rem;border-radius:4px;font-size:.68rem;">${c.cefr_level||'—'}</span>
      </div>
      <div class="cefr-scale">
        ${LEVELS.map(l => `<div class="cefr-pip ${LEVELS.indexOf(l) <= LEVELS.indexOf(c.cefr_level||'A1') ? 'on' : ''}"></div>`).join('')}
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:.25rem;">
        ${LEVELS.map(l => `<span style="font-size:.58rem;opacity:.55;">${l}</span>`).join('')}
      </div>
    </div>

    ${c.bio ? `<div style="font-size:.83rem;color:var(--gray);margin-bottom:.8rem;line-height:1.5;">${c.bio}</div>` : ''}

    <div style="display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.8rem;">
      ${(c.skills||[]).map(s => `<span class="badge badge-teal">${s}</span>`).join('')}
    </div>

    ${c.speaking_clip_url
      ? `<div style="background:var(--teal-light);border-radius:8px;padding:.6rem .8rem;margin-bottom:.8rem;">
           <div style="font-size:.7rem;color:var(--teal);font-weight:600;margin-bottom:.3rem;">🎤 Speaking sample</div>
           <audio controls style="width:100%;height:28px;" src="${c.speaking_clip_url}"></audio>
         </div>`
      : `<div style="font-size:.75rem;color:var(--gray);margin-bottom:.8rem;">No speaking sample uploaded yet</div>`
    }

    <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center;" id="contactBtn">
      Contact Candidate →
    </button>`;

  document.getElementById('contactBtn').addEventListener('click', () => {
    toast(`Message sent to ${c.full_name||'candidate'}!`);
    panel.style.display = 'none';
    activeId = null;
  });
}

// ── Init ───────────────────────────────────────────────
async function init() {
  // 1. Session check
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  // 2. Verify employer profile exists
  const { data: employer } = await sb
    .from('employers')
    .select('org_name, county')
    .eq('id', session.user.id)
    .single();

  if (!employer) { window.location.href = 'register-employer.html'; return; }

  // 3. Load all candidates
  const { data: candidates, error } = await sb
    .from('candidates')
    .select('id, full_name, county, cefr_level, profile_type, bio, skills, verified, assessment_completed, speaking_clip_url, available_from')
    .order('verified', { ascending: false })
    .order('assessment_completed', { ascending: false });

  if (error) {
    console.error('Candidates load error:', error);
    toast('Could not load candidates', 'error');
  }

  allCandidates = candidates || [];

  // 4. Hide loader, render shell
  document.getElementById('loading-screen').style.display = 'none';
  const shell = document.getElementById('shell');
  shell.style.display = 'flex';

  shell.innerHTML = `
    ${sidebar()}
    <div class="main-area">
      <div style="height:60px;background:#fff;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;flex-shrink:0;">
        <h1 style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;">Find Candidates</h1>
        <div style="display:flex;align-items:center;gap:0.8rem;">
          <div style="width:32px;height:32px;border-radius:50%;background:#E8F5F3;display:flex;align-items:center;justify-content:center;font-size:1.1rem;">🏛️</div>
          <span style="font-size:0.88rem;font-weight:500;color:#374151;">${employer.org_name}</span>
        </div>
      </div>

      <div style="padding:.8rem 1.2rem;background:var(--white);border-bottom:1px solid var(--border);display:flex;gap:.7rem;flex-wrap:wrap;align-items:center;flex-shrink:0;">
        <input type="text" id="sQ" class="form-input" placeholder="Search name, role, skills…" style="flex:1;min-width:160px;">
        <select class="form-input" style="width:auto;" id="sCefr">
          <option value="">All CEFR levels</option>
          ${LEVELS.map(l => `<option value="${l}">${l}+ (${l} and above)</option>`).join('')}
        </select>
        <select class="form-input" style="width:auto;" id="sCounty">
          <option value="">All counties</option>
          ${Object.keys(COUNTY_COORDS).sort().map(c => `<option value="${c}">${c}</option>`).join('')}
        </select>
        <select class="form-input" style="width:auto;" id="sVerif">
          <option value="">All candidates</option>
          <option value="true">Verified only</option>
        </select>
        <select class="form-input" style="width:auto;" id="sAssessed">
          <option value="">All</option>
          <option value="true">Assessed only</option>
        </select>
      </div>

      <div style="display:grid;grid-template-columns:340px 1fr;flex:1;overflow:hidden;height:calc(100vh - 121px);">

        <!-- Candidate list -->
        <div style="overflow-y:auto;padding:.8rem;display:flex;flex-direction:column;gap:.6rem;border-right:1px solid var(--border);">
          <div id="rCnt" style="font-size:.78rem;font-weight:600;color:var(--gray);padding:.2rem 0;">Loading…</div>
          <div id="cList"></div>
        </div>

        <!-- Map + detail panel -->
        <div style="position:relative;">
          <div id="map" style="height:100%;"></div>

          <!-- Detail panel overlay -->
          <div id="cDetail" style="display:none;position:absolute;top:1rem;right:1rem;width:300px;background:var(--white);border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.18);padding:1.2rem;z-index:1000;max-height:calc(100% - 2rem);overflow-y:auto;">
            <button id="closeDetail" style="position:absolute;top:.7rem;right:.7rem;background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--gray);">×</button>
            <div id="cDContent"></div>
          </div>

          <!-- Empty state overlay when no candidates -->
          <div id="emptyMap" style="display:none;position:absolute;inset:0;background:rgba(245,242,237,.9);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.8rem;z-index:500;">
            <div style="font-size:3rem;">🗺️</div>
            <div style="font-weight:600;color:var(--dark);">No candidates on map yet</div>
            <div style="font-size:.85rem;color:var(--gray);">Candidates appear here as they sign up</div>
          </div>
        </div>

      </div>
    </div>`;

  // 5. Init map
  map = L.map('map').setView([53.4, -8.0], 7);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // 6. Wire filters
  ['sQ','sCefr','sCounty','sVerif','sAssessed'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener(id === 'sQ' ? 'input' : 'change', applyFilters);
  });

  // Close detail panel
  document.getElementById('closeDetail').addEventListener('click', () => {
    document.getElementById('cDetail').style.display = 'none';
    activeId = null;
    renderList(filtered);
    Object.values(markers).forEach(({ marker }) => marker.setIcon(iconDefault));
  });

  // Sign out
  document.getElementById('signout-btn').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'login.html';
  });

  // 7. Show empty map state if no candidates at all
  if (allCandidates.length === 0) {
    document.getElementById('emptyMap').style.display = 'flex';
  }

  // 8. Initial render
  applyFilters();
}

// Make applyFilters available inside event listeners after init
