<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>poist.ie — Employer Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --teal:#1A7A6E;--teal-dark:#0f5a51;--teal-light:#E8F5F3;--teal-mid:#2a9d8f;
  --gold:#F5C518;--gold-dark:#d4a800;
  --dark:#1A1A2E;--gray:#6B7280;--cream:#F5F2ED;--border:#E5E7EB;--white:#ffffff;
  --red:#dc2626;--green:#16a34a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#F5F2ED;color:var(--dark);overflow-x:hidden;}
.app-shell{display:flex;min-height:100vh;}
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.page-content{flex:1;overflow-y:auto;padding:1.5rem;}
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.4rem;}
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.6rem 1.2rem;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;border:none;transition:all 0.18s;text-decoration:none;}
.btn-primary{background:var(--gold);color:var(--dark);}
.btn-primary:hover{background:var(--gold-dark);transform:translateY(-1px);}
.btn-teal{background:var(--teal);color:#fff;}
.btn-teal:hover{background:var(--teal-dark);}
.btn-outline{background:transparent;border:1.5px solid var(--teal);color:var(--teal);}
.btn-outline:hover{background:var(--teal-light);}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--gray);}
.btn-ghost:hover{border-color:var(--dark);color:var(--dark);}
.badge{display:inline-flex;align-items:center;padding:0.18rem 0.55rem;border-radius:4px;font-size:0.72rem;font-weight:700;}
.badge-green{background:#dcfce7;color:var(--green);}
.badge-gray{background:#F3F4F6;color:var(--gray);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.2rem;}
.stat-num{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--teal);}
.stat-label{font-size:0.78rem;color:var(--gray);margin-top:0.15rem;}
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.section-hdr h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;}
.verified{display:inline-flex;align-items:center;gap:0.3rem;background:#E8F5F3;color:var(--teal);font-size:0.72rem;font-weight:600;padding:0.18rem 0.55rem;border-radius:4px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.fade-in{animation:fadeIn 0.3s ease both;}
#loading-screen{position:fixed;inset:0;background:var(--cream);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:1rem;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@media(max-width:768px){.stats-grid{grid-template-columns:1fr 1fr;}.two-col{grid-template-columns:1fr!important;}}
</style>
</head>
<body>

<div id="loading-screen">
  <div class="spinner"></div>
  <span style="font-size:0.9rem;color:var(--gray);">Loading dashboard…</span>
</div>

<div class="app-shell" id="shell" style="display:none;"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

const SUPABASE_URL = 'https://kpfshjarepmazrgzffot.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZnNoamFyZXBtYXpyZ3pmZm90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDM2MDI1NTUsImV4cCI6MjA1OTE3ODU1NX0.pjCXFhFHMl0A5XFM1KGQdEBQ_WmFAz_of0VdvXfJ_5k';
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

// ── UI helpers ─────────────────────────────────────────
const logo = (dark=false) => `<a href="index.html" style="text-decoration:none;font-family:'DM Sans',sans-serif;font-weight:700;font-size:1.65rem;letter-spacing:-0.03em;background:linear-gradient(90deg,${dark?'rgba(255,255,255,0.9),rgba(255,255,255,0.6)':'#0f5a51,#2a9d8f'});-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">poist.ie</a>`;

const cefrBadge = (level) => `<span style="background:#F5C518;color:#1A1A2E;font-size:0.7rem;font-weight:700;padding:0.18rem 0.5rem;border-radius:4px;">${level||'—'}</span>`;

const toast = (msg, type='success') => {
  const el = document.createElement('div');
  const bg = type==='success'?'#1A7A6E':type==='error'?'#dc2626':'#1A1A2E';
  el.style.cssText = `position:fixed;bottom:1.5rem;right:1.5rem;background:${bg};color:#fff;padding:0.8rem 1.3rem;border-radius:10px;font-size:0.9rem;font-weight:500;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.2);animation:slideIn 0.3s ease;`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3500);
};

const sidebar = () => `
  <aside style="width:220px;min-height:100vh;background:#0f5a51;display:flex;flex-direction:column;flex-shrink:0;">
    <div style="padding:1.4rem 1.2rem 1rem;border-bottom:1px solid rgba(255,255,255,0.1);">${logo(true)}</div>
    <nav style="padding:0.8rem 0;flex:1;">
      ${[
        {href:'employer-dashboard.html',icon:'⊞',label:'Dashboard',active:true},
        {href:'employer-search.html',icon:'🔍',label:'Find Candidates'},
        {href:'employer-post-job.html',icon:'＋',label:'Post a Job'},
      ].map(l=>`
        <a href="${l.href}" style="display:flex;align-items:center;gap:0.7rem;padding:0.7rem 1.2rem;text-decoration:none;font-size:0.92rem;font-weight:500;transition:background 0.15s;${l.active?'background:rgba(255,255,255,0.15);color:#fff;':'color:rgba(255,255,255,0.7);'}"
           onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='${l.active?'rgba(255,255,255,0.15)':'transparent'}'">
          <span style="font-size:1rem;width:20px;text-align:center;">${l.icon}</span>${l.label}
        </a>`).join('')}
    </nav>
    <div style="padding:1rem 1.2rem;border-top:1px solid rgba(255,255,255,0.1);">
      <button id="signout-btn" style="background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.7);padding:0.5rem 1rem;border-radius:6px;cursor:pointer;font-size:0.85rem;width:100%;text-align:left;">← Sign out</button>
    </div>
  </aside>`;

// Demo candidates shown in Top Matches until employer-search is wired to real data
const demoCandidates = [
  {name:'Síle Ní Bhriain',title:'Content Creator',location:'Galway',cefr:'B2',available:'Passive',verified:true,avatar:'👩‍💼'},
  {name:'Ciarán Mac Giolla',title:'Software Developer',location:'Dublin',cefr:'C1',available:'Active',verified:true,avatar:'👨‍💻'},
  {name:'Aoife Ní Fhaoláin',title:'Irish Language Officer',location:'Galway',cefr:'C2',available:'Passive',verified:true,avatar:'👩‍🏫'},
];

// ── Init ───────────────────────────────────────────────
async function init() {
  // 1. Session check — redirect to login if none
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  // 2. Load employer row
  const { data: employer, error } = await sb
    .from('employers')
    .select('*')
    .eq('id', session.user.id)
    .single();

  if (error || !employer) {
    // Authenticated but no employer profile yet
    window.location.href = 'register-employer.html';
    return;
  }

  // 3. Load this employer's job listings
  const { data: jobRows } = await sb
    .from('jobs')
    .select('id, title, location, county, cefr_level, created_at, applicant_count')
    .eq('employer_id', session.user.id)
    .order('created_at', { ascending: false });

  const jobs = jobRows || [];
  const totalApplicants = jobs.reduce((sum, j) => sum + (j.applicant_count || 0), 0);

  // 4. Render
  document.getElementById('loading-screen').style.display = 'none';
  const shell = document.getElementById('shell');
  shell.style.display = 'flex';

  shell.innerHTML = `
    ${sidebar()}
    <div class="main-area">
      <div style="height:60px;background:#fff;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;flex-shrink:0;">
        <h1 style="font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:700;">Dashboard</h1>
        <div style="display:flex;align-items:center;gap:0.8rem;">
          <div style="width:32px;height:32px;border-radius:50%;background:#E8F5F3;display:flex;align-items:center;justify-content:center;font-size:1.1rem;">🏛️</div>
          <span style="font-size:0.88rem;font-weight:500;color:#374151;">${employer.org_name}</span>
        </div>
      </div>
      <div class="page-content fade-in">

        <div style="margin-bottom:1.5rem;">
          <h2 style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:.3rem;">Welcome, ${employer.org_name} 🏛️</h2>
          <p style="color:var(--gray);font-size:.92rem;">Post jobs and find verified Irish speakers — free during launch.</p>
        </div>

        <!-- 2030 Banner -->
        <div style="background:linear-gradient(135deg,#1a1a2e,#0d3d38);border-radius:14px;padding:1.2rem 1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;">
          <div>
            <div style="color:#F5C518;font-weight:700;font-size:.85rem;margin-bottom:.3rem;">⚖️ 2030 Compliance Tracker</div>
            <div style="color:rgba(255,255,255,.8);font-size:.9rem;">Official Languages Act 2021 — 20% of new recruits must be Irish-competent by Dec 2030</div>
          </div>
          <div style="display:flex;gap:.8rem;">
            <div style="text-align:center;background:rgba(255,255,255,.08);border-radius:10px;padding:.7rem 1.2rem;">
              <div style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:#F5C518;">${jobs.length}</div>
              <div style="font-size:.72rem;color:rgba(255,255,255,.5);">Active roles</div>
            </div>
            <div style="text-align:center;background:rgba(255,255,255,.08);border-radius:10px;padding:.7rem 1.2rem;">
              <div style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:#F5C518;">${totalApplicants}</div>
              <div style="font-size:.72rem;color:rgba(255,255,255,.5);">Applicants</div>
            </div>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-grid">
          <div class="stat-card"><div class="stat-num">${jobs.length}</div><div class="stat-label">Active listings</div></div>
          <div class="stat-card"><div class="stat-num">${totalApplicants}</div><div class="stat-label">Total applicants</div></div>
          <div class="stat-card"><div class="stat-num">${employer.county||'—'}</div><div class="stat-label">Your county</div></div>
          <div class="stat-card"><div class="stat-num">Free</div><div class="stat-label">Current plan</div></div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;" class="two-col">

          <!-- Listings -->
          <div class="card">
            <div class="section-hdr">
              <h2>My Listings</h2>
              <a href="employer-post-job.html" class="btn btn-primary" style="font-size:.8rem;padding:.35rem .8rem;">+ Post Job</a>
            </div>
            ${jobs.length === 0
              ? `<div style="text-align:center;padding:2rem 1rem;color:var(--gray);">
                   <div style="font-size:2.5rem;margin-bottom:.6rem;">📋</div>
                   <div style="font-size:.9rem;margin-bottom:1rem;">No listings yet — post your first job free</div>
                   <a href="employer-post-job.html" class="btn btn-teal">Post a Job</a>
                 </div>`
              : jobs.map(j => `
                  <div style="border:1px solid var(--border);border-radius:10px;padding:.9rem;margin-bottom:.7rem;display:flex;justify-content:space-between;align-items:center;">
                    <div>
                      <div style="font-weight:600;font-size:.9rem;margin-bottom:.2rem;">${j.title||'Untitled'}</div>
                      <div style="font-size:.78rem;color:var(--gray);">📍 ${j.location||j.county||'—'} · ${new Date(j.created_at).toLocaleDateString('en-IE')}</div>
                      <div style="display:flex;gap:.4rem;margin-top:.4rem;">${cefrBadge(j.cefr_level)}<span class="badge badge-green">Active</span></div>
                    </div>
                    <div style="text-align:right;">
                      <div style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:var(--teal);">${j.applicant_count||0}</div>
                      <div style="font-size:.72rem;color:var(--gray);">applicants</div>
                    </div>
                  </div>`).join('')
            }
            <a href="employer-post-job.html" class="btn btn-outline" style="width:100%;justify-content:center;margin-top:.3rem;">+ Post another job</a>
          </div>

          <!-- Top Matches -->
          <div class="card">
            <div class="section-hdr">
              <h2>Top Matches</h2>
              <a href="employer-search.html" class="btn btn-outline" style="font-size:.8rem;padding:.35rem .8rem;">View all</a>
            </div>
            ${demoCandidates.map(c => `
              <div style="border:1px solid var(--border);border-radius:10px;padding:.9rem;margin-bottom:.7rem;display:flex;align-items:center;gap:.8rem;">
                <div style="width:38px;height:38px;border-radius:50%;background:var(--teal-light);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;">${c.avatar}</div>
                <div style="flex:1;min-width:0;">
                  <div style="font-weight:600;font-size:.88rem;">${c.name}${c.verified?' <span class="verified">✓ Verified</span>':''}</div>
                  <div style="font-size:.78rem;color:var(--gray);">${c.title} · ${c.location}</div>
                  <div style="display:flex;gap:.3rem;margin-top:.3rem;">${cefrBadge(c.cefr)}<span class="badge badge-gray">${c.available}</span></div>
                </div>
                <button class="btn btn-primary" style="font-size:.78rem;padding:.3rem .65rem;" onclick="window._toast('Message sent!')">Contact</button>
              </div>`).join('')}
            <p style="font-size:.75rem;color:var(--gray);margin-top:.3rem;text-align:center;">Live candidate search coming soon</p>
          </div>

        </div>

        <!-- Quick Actions -->
        <div class="card" style="margin-top:1.2rem;">
          <h2 style="font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:1rem;">Quick actions</h2>
          <div style="display:flex;gap:.8rem;flex-wrap:wrap;">
            <a href="employer-post-job.html" class="btn btn-teal">📋 Post a Job</a>
            <a href="employer-search.html" class="btn btn-outline">🔍 Search Candidates</a>
            <button onclick="window._toast('Report downloaded!')" class="btn btn-ghost">📊 2030 Report</button>
            <button id="signout-btn2" class="btn btn-ghost">← Sign out</button>
          </div>
        </div>

        <!-- Org profile summary -->
        <div class="card" style="margin-top:1.2rem;">
          <div class="section-hdr"><h2>Organisation Profile</h2></div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.8rem;">
            ${[
              ['Organisation', employer.org_name],
              ['Contact', employer.contact_name],
              ['Type', employer.org_type],
              ['County', employer.county],
              ['Email', employer.email],
              ['Verified', employer.verified ? '✓ Verified' : 'Pending review'],
            ].map(([label, val]) => `
              <div>
                <div style="font-size:.75rem;color:var(--gray);margin-bottom:.2rem;">${label}</div>
                <div style="font-weight:600;font-size:.9rem;">${val||'—'}</div>
              </div>`).join('')}
          </div>
        </div>

      </div>
    </div>`;

  window._toast = toast;
  document.getElementById('signout-btn').addEventListener('click', signOut);
  document.getElementById('signout-btn2').addEventListener('click', signOut);
}

async function signOut() {
  await sb.auth.signOut();
  window.location.href = 'login.html';
}

init().catch(err => {
  console.error(err);
  document.getElementById('loading-screen').innerHTML = `
    <div style="text-align:center;padding:2rem;">
      <div style="font-size:2rem;margin-bottom:1rem;">⚠️</div>
      <p style="color:#dc2626;font-weight:600;margin-bottom:1rem;">Could not load dashboard</p>
      <a href="login.html" style="color:#1A7A6E;text-decoration:underline;">Back to login</a>
    </div>`;
});
</script>
</body>
</html>
