<style>
/* poist.ie base styles — shared across all pages */
:root {
  --teal:#1A7A6E;--teal-dark:#0f5a51;--teal-light:#E8F5F3;--teal-mid:#2a9d8f;
  --gold:#F5C518;--gold-dark:#d4a800;
  --dark:#1A1A2E;--gray:#6B7280;--cream:#F5F2ED;--border:#E5E7EB;--white:#ffffff;
  --red:#dc2626;--green:#16a34a;
  --sidebar-w:220px;
  --forest:#0D3B2E;
  --green2:#2D8653;
  --gold2:#C9921A;
  --ink:#0F1A13;
  --body:#2E3C34;
  --muted:#6B7F72;
  --gray-faint:#C4D4CB;
  --off:#F5F7F5;
  --radius:14px;
  --mono:'JetBrains Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:#F5F2ED;color:var(--dark);overflow-x:hidden;}
input,select,textarea{font-family:'DM Sans',sans-serif;}
.logo{text-decoration:none;font-family:'DM Sans',sans-serif;font-weight:700;font-size:1.65rem;letter-spacing:-0.03em;background:linear-gradient(90deg,#0f5a51,#2a9d8f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* Layout */
.app-shell{display:flex;min-height:100vh;}
.main-area{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}
.page-content{flex:1;overflow-y:auto;padding:1.5rem;}

/* Cards */
.card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:1.4rem;}
.card-sm{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:1rem;}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:0.4rem;padding:0.6rem 1.2rem;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;border:none;transition:all 0.18s;text-decoration:none;}
.btn-primary{background:var(--gold);color:var(--dark);}
.btn-primary:hover{background:var(--gold-dark);transform:translateY(-1px);}
.btn-teal{background:var(--teal);color:#fff;}
.btn-teal:hover{background:var(--teal-dark);}
.btn-outline{background:transparent;border:1.5px solid var(--teal);color:var(--teal);}
.btn-outline:hover{background:var(--teal-light);}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--gray);}
.btn-ghost:hover{border-color:var(--dark);color:var(--dark);}
.btn-danger{background:#fef2f2;border:1.5px solid #fecaca;color:var(--red);}
.btn-danger:hover{background:#fee2e2;}
.btn-lg{padding:0.8rem 1.8rem;font-size:1rem;border-radius:10px;}

/* Form elements */
.form-group{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem;}
.form-label{font-size:0.85rem;font-weight:600;color:var(--dark);}
.form-input{padding:0.65rem 0.9rem;border:1.5px solid var(--border);border-radius:8px;font-size:0.9rem;color:var(--dark);background:var(--white);transition:border-color 0.18s;outline:none;}
.form-input:focus{border-color:var(--teal);}
.form-input.error{border-color:var(--red);}
.form-hint{font-size:0.78rem;color:var(--gray);}
.form-error{font-size:0.78rem;color:var(--red);}
select.form-input{cursor:pointer;}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:0.18rem 0.55rem;border-radius:4px;font-size:0.72rem;font-weight:700;}
.badge-gold{background:var(--gold);color:var(--dark);}
.badge-teal{background:var(--teal-light);color:var(--teal);}
.badge-gray{background:#F3F4F6;color:var(--gray);}
.badge-green{background:#dcfce7;color:var(--green);}
.badge-red{background:#fef2f2;color:var(--red);}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1.1rem 1.2rem;}
.stat-num{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;color:var(--teal);}
.stat-label{font-size:0.78rem;color:var(--gray);margin-top:0.15rem;}

/* CEFR scale */
.cefr-scale{display:flex;gap:3px;}
.cefr-pip{flex:1;height:6px;border-radius:3px;background:#E5E7EB;}
.cefr-pip.on{background:var(--gold);}

/* Section header */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.section-hdr h2{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;}

/* Verified badge */
.verified{display:inline-flex;align-items:center;gap:0.3rem;background:#E8F5F3;color:var(--teal);font-size:0.72rem;font-weight:600;padding:0.18rem 0.55rem;border-radius:4px;}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
.fade-in{animation:fadeIn 0.3s ease both;}

/* Public nav */
.pub-nav{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(255,255,255,0.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 2rem;height:66px;display:flex;align-items:center;justify-content:space-between;}
.pub-nav-links{display:flex;align-items:center;gap:1.8rem;}
.pub-nav-links a{text-decoration:none;color:var(--gray);font-weight:500;font-size:0.93rem;transition:color 0.2s;}
.pub-nav-links a:hover{color:var(--teal);}
.pub-nav-cta{background:var(--gold);color:var(--dark)!important;padding:0.5rem 1.2rem;border-radius:7px;font-weight:600;font-size:0.88rem;}
.pub-nav-cta:hover{background:var(--gold-dark)!important;}

/* Responsive */
@media(max-width:768px){
  .sidebar{display:none;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .pub-nav-links{display:none;}
}

.pub-nav-cta{background:var(--gold);color:var(--dark)!important;padding:.5rem 1.2rem;border-radius:7px;font-weight:600;font-size:.88rem;}
/* NAV */
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:.5rem 2rem}
.nav-logo{display:block}
.nav-links{display:flex;align-items:center;gap:1.8rem;font-size:.9rem;font-weight:500}
.nav-links a{color:var(--body);transition:color .15s}
.nav-links a:hover{color:var(--green)}
.ga-sm{font-size:.75rem;color:var(--muted);margin-left:.25rem}
.nav-links a.ghost{border:1.5px solid var(--border);border-radius:8px;padding:.4rem .9rem;color:var(--body)}
.nav-links a.ghost:hover{border-color:var(--green);color:var(--green)}
.nav-links a.cta{background:var(--gold);color:var(--forest);border-radius:8px;padding:.45rem 1.1rem;font-weight:700;transition:background .15s}
.nav-links a.cta:hover{background:#f7ce3a}
/* FOOTER */
footer{background:var(--ink);color:rgba(255,255,255,.6);padding:4rem 2rem 2rem}
.foot-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3rem;margin-bottom:3rem}
.foot-logo{margin-bottom:.9rem}
.foot-brand p{font-size:.85rem;line-height:1.7;max-width:260px;margin-bottom:.6rem}
.foot-brand .ga{font-size:.78rem;color:rgba(255,255,255,.3)}
footer h5{font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4);font-family:var(--mono);margin-bottom:1.1rem}
footer h5 .ga-sm{display:block;font-size:.65rem;text-transform:none;letter-spacing:0;margin-top:.2rem;color:rgba(255,255,255,.2)}
footer ul{list-style:none;display:flex;flex-direction:column;gap:.6rem}
footer ul a{font-size:.88rem;color:rgba(255,255,255,.55);transition:color .15s}
footer ul a:hover{color:var(--white)}
.foot-bottom{max-width:1200px;margin:0 auto;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.foot-bottom span{font-size:.8rem;color:rgba(255,255,255,.25)}
.foot-bottom .tag{font-size:.75rem;font-style:italic}
@media(max-width:1024px){.foot-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.nav{padding:.75rem 1rem}.nav-links{gap:1rem;font-size:.82rem}.foot-grid{grid-template-columns:1fr}}
</style>
</head>

            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.6rem;">
              <span style="font-weight:600;">Minimum CEFR Level Required</span>
              <span style="background:var(--gold);color:var(--dark);padding:.2rem .6rem;border-radius:5px;font-size:.8rem;font-weight:700;">${job.cefr} — ${POIST.cefrLabel[job.cefr]}</span>
            </div>
            <div style="display:flex;gap:3px;">
              ${POIST.cefrLevels.map(l=>`<div style="flex:1;height:7px;border-radius:3px;background:${POIST.cefrLevels.indexOf(l)<=POIST.cefrLevels.indexOf(job.cefr)?'var(--gold)':'rgba(255,255,255,.2)'};"></div>`).join('')}
            </div>
            <div style="display:flex;justify-content:space-between;margin-top:.3rem;">${POIST.cefrLevels.map(l=>`<span style="font-size:.6rem;opacity:.55;">${l}</span>`).join('')}</div>
          </div>

          <div style="background:var(--teal-light);border-radius:10px;padding:1rem;font-size:.85rem;color:var(--teal);">
            💡 Not sure if your level meets the requirement? <a href="cefr-guide.html" style="color:var(--teal);font-weight:700;">Read our CEFR guide →</a>
          </div>
        </div>
      </div>

      <!-- Sidebar: Apply -->
      <div style="position:sticky;top:80px;">
        <div style="background:var(--white);border-radius:16px;padding:1.5rem;border:1px solid var(--border);margin-bottom:1rem;">
          <h3 style="font-family:'Syne',sans-serif;font-weight:700;margin-bottom:1rem;">Apply for this role</h3>
          ${user ? `
            <div style="display:flex;align-items:center;gap:.7rem;background:var(--teal-light);border-radius:10px;padding:.8rem;margin-bottom:1rem;">
              <div style="width:36px;height:36px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:1.1rem;">${user.avatar||'👤'}</div>
              <div>
                <div style="font-weight:600;font-size:.88rem;">${user.name}</div>
                <div style="font-size:.75rem;color:var(--gray);">Applying with your Language Passport</div>
              </div>
            </div>
            <div style="font-size:.82rem;color:var(--gray);margin-bottom:1rem;">Your Language Passport shows your verified Irish level. The employer will receive your profile and contact you directly.</div>
            <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center;" onclick="applyNow()">Apply Now →</button>
            <div style="text-align:center;margin-top:.6rem;font-size:.75rem;color:var(--gray);">Your passport will be sent to ${job.org}</div>
          ` : `
            <p style="color:var(--gray);font-size:.88rem;line-height:1.6;margin-bottom:1rem;">Create a free Language Passport to apply. It takes under 5 minutes and no CV is needed.</p>
            <a href="register-candidate.html" class="btn btn-teal btn-lg" style="width:100%;justify-content:center;display:flex;margin-bottom:.6rem;">Create free profile →</a>
            <a href="login.html" style="display:block;text-align:center;color:var(--teal);font-size:.85rem;font-weight:500;text-decoration:none;">Already have an account? Sign in</a>
          `}
        </div>
        <div style="background:var(--white);border-radius:14px;padding:1.2rem;border:1px solid var(--border);">
          <div style="font-size:.78rem;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.8rem;">Job summary</div>
          ${[
            ['Organisation', job.org],
            ['Location', '📍 '+job.location],
            ['Type', job.type],
            ['Sector', job.sector],
            ['Irish required', job.cefr+' '+POIST.cefrLabel[job.cefr]],
            ['Posted', job.posted],
          ].map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.83rem;"><span style="color:var(--gray);">${k}</span><span style="font-weight:600;text-align:right;">${v}</span></div>`).join('')}
        </div>
        <div style="margin-top:1rem;text-align:center;">
          <a href="jobs.html" style="color:var(--gray);font-size:.82rem;text-decoration:none;">← Browse all jobs</a>
        </div>
      </div>

    </div>
  </div>
`;

window.applyNow = () => {
  document.querySelector('button').textContent = 'Application submitted! ✓';
  document.querySelector('button').style.background = '#16a34a';
  document.querySelector('button').style.color = '#fff';
  document.querySelector('button').disabled = true;
  POIST.toast('Application sent to ' + job.org + '!');
};
</script>
</body>
</html>
