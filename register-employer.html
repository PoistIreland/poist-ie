<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>poist.ie — Register as Employer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--teal:#1A6B3C;--teal-dark:#0D3B2E;--teal-mid:#2D8653;--teal-light:#F5F7F5;--gold:#F5C518;--navy:#0F1A13;--gray:#6B7F72;--border:#E5E7EB;--white:#ffffff;
  --forest:#0D3B2E;
  --green:#1A6B3C;
  --green2:#2D8653;
  --gold2:#C9921A;
  --ink:#0F1A13;
  --body:#2E3C34;
  --muted:#6B7F72;
  --gray-faint:#C4D4CB;
  --off:#F5F7F5;
  --radius:14px;
  --mono:'JetBrains Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;color:var(--navy);background:linear-gradient(160deg,var(--navy) 0%,#0D3B2E 60%,var(--teal) 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1.5rem;}
.auth-card{background:#fff;border-radius:24px;width:100%;max-width:500px;box-shadow:0 24px 60px rgba(0,0,0,.3);overflow:hidden;}
.card-header{background:linear-gradient(135deg,var(--navy),#0D3B2E);padding:1.8rem 2rem;color:#fff;}
.card-body{padding:2rem;}
.step-track{display:flex;align-items:center;margin-bottom:.5rem;}
.step-node{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;font-family:'Syne',sans-serif;}
.step-node.done{background:var(--teal);color:#fff;}
.step-node.active{background:var(--gold);color:var(--navy);}
.step-node.pending{background:var(--border);color:#9CA3AF;}
.step-line{flex:1;height:2px;background:var(--border);}
.step-line.done{background:var(--teal);}
.step{display:none;}
.step.active{display:block;animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.form-group{display:flex;flex-direction:column;gap:.4rem;margin-bottom:1rem;}
.form-label{font-size:.85rem;font-weight:600;color:var(--navy);}
.form-input{padding:.7rem 1rem;border:1.5px solid var(--border);border-radius:10px;font-size:.9rem;color:var(--navy);background:var(--white);transition:border-color .18s;outline:none;width:100%;font-family:'DM Sans',sans-serif;}
.form-input:focus{border-color:var(--teal);}
select.form-input{cursor:pointer;}
.form-error{font-size:.78rem;color:#dc2626;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.4rem;padding:.75rem 1.2rem;border-radius:10px;font-size:.95rem;font-weight:700;cursor:pointer;border:none;transition:all .18s;font-family:'DM Sans',sans-serif;}
.btn-teal{background:var(--teal);color:#fff;width:100%;}
.btn-teal:hover{background:var(--teal-dark);}
.btn-ghost{background:transparent;border:1.5px solid var(--border);color:var(--gray);width:100%;}
.btn-ghost:hover{border-color:var(--navy);color:var(--navy);}
/* NAV */
nav{height:auto}
.nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:.5rem 2rem}
.nav-logo{display:block}
.nav-links{display:flex;align-items:center;gap:1.8rem;font-size:.9rem;font-weight:500}
.nav-links a{color:var(--body);transition:color .15s}
.nav-links a:hover{color:var(--green)}
.ga-sm{font-size:.75rem;color:var(--muted);margin-left:.25rem}
.nav-links a.ghost{border:1.5px solid var(--border);border-radius:8px;padding:.4rem .9rem;color:var(--body)}
.nav-links a.ghost:hover{border-color:var(--green);color:var(--green)}
.nav-links a.cta{background:var(--gold);color:var(--forest);border-radius:8px;padding:.45rem 1.1rem;font-weight:700;transition:background .15s}
.nav-links a.cta:hover{background:#f7ce3a}
/* FOOTER */
footer{background:var(--ink);color:rgba(255,255,255,.6);padding:4rem 2rem 2rem}
.foot-grid{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:3rem;margin-bottom:3rem}
.foot-logo{margin-bottom:.9rem}
.foot-brand p{font-size:.85rem;line-height:1.7;max-width:260px;margin-bottom:.6rem}
.foot-brand .ga{font-size:.78rem;color:rgba(255,255,255,.3)}
footer h5{font-size:.75rem;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4);font-family:var(--mono);margin-bottom:1.1rem}
footer h5 .ga-sm{display:block;font-size:.65rem;text-transform:none;letter-spacing:0;margin-top:.2rem;color:rgba(255,255,255,.2)}
footer ul{list-style:none;display:flex;flex-direction:column;gap:.6rem}
footer ul a{font-size:.88rem;color:rgba(255,255,255,.55);transition:color .15s}
footer ul a:hover{color:var(--white)}
.foot-bottom{max-width:1200px;margin:0 auto;padding-top:1.5rem;border-top:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem}
.foot-bottom span{font-size:.8rem;color:rgba(255,255,255,.25)}
.foot-bottom .tag{font-size:.75rem;font-style:italic}
@media(max-width:1024px){.foot-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.nav{padding:.75rem 1rem}.nav-links{gap:1rem;font-size:.82rem}.foot-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="auth-card">
  <div class="card-header">
    <a href="index.html" style="text-decoration:none;font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;color:#fff;letter-spacing:-.03em;">poist.ie</a>
    <div style="margin-top:1rem;">
      <div style="background:rgba(245,197,24,.15);border:1px solid rgba(245,197,24,.3);color:var(--gold);display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .8rem;border-radius:100px;font-size:.78rem;font-weight:600;margin-bottom:.8rem;">✓ Free during launch phase</div>
      <h1 style="font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:.2rem;">Register your organisation</h1>
      <p style="color:rgba(255,255,255,.65);font-size:.85rem;">Start hiring verified Irish speakers · 2 quick steps</p>
    </div>
  </div>
  <div class="card-body">
    <div class="step-track">
      <div class="step-node active" id="sn1">1</div>
      <div class="step-line" id="sl1"></div>
      <div class="step-node pending" id="sn2">2</div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:.35rem;margin-bottom:1.2rem;font-size:.72rem;color:var(--gray);font-weight:600;">
      <span>Organisation</span><span>Your account</span>
    </div>

    <!-- Step 1 -->
    <div class="step active" id="step1">
      <div class="form-group"><label class="form-label">Organisation name *</label><input type="text" id="orgName" class="form-input" placeholder="e.g. Galway County Council"></div>
      <div class="form-group">
        <label class="form-label">Organisation type *</label>
        <select id="orgType" class="form-input">
          <option value="">Select type…</option>
          <option>Government department</option><option>Local authority</option><option>HSE / Health body</option><option>Education provider</option><option>Semi-state body</option><option>Private sector</option><option>Non-profit / NGO</option><option>Gaeltacht organisation</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem;">
        <div class="form-group">
          <label class="form-label">Primary county</label>
          <select id="county" class="form-input"><option value="">Select…</option><option>Carlow</option><option>Cavan</option><option>Clare</option><option>Cork</option><option>Donegal</option><option>Dublin</option><option>Galway</option><option>Kerry</option><option>Kildare</option><option>Kilkenny</option><option>Laois</option><option>Leitrim</option><option>Limerick</option><option>Longford</option><option>Louth</option><option>Mayo</option><option>Meath</option><option>Monaghan</option><option>Offaly</option><option>Roscommon</option><option>Sligo</option><option>Tipperary</option><option>Waterford</option><option>Westmeath</option><option>Wexford</option><option>Wicklow</option></select>
        </div>
        <div class="form-group"><label class="form-label">Website <span style="font-weight:400;color:#9CA3AF;">(optional)</span></label><input type="url" id="website" class="form-input" placeholder="https://…"></div>
      </div>
      <div style="background:var(--teal-light);border:1px solid rgba(26,107,60,.2);border-radius:12px;padding:.9rem;margin-bottom:1rem;font-size:.82rem;color:var(--teal);">
        ⚖️ Posting on poist.ie contributes toward your <strong>Official Languages Act 2021</strong> compliance obligations.
      </div>
      <button class="btn btn-teal" onclick="nextStep()">Continue →</button>
    </div>

    <!-- Step 2 -->
    <div class="step" id="step2">
      <div class="form-group"><label class="form-label">Your full name *</label><input type="text" id="contactName" class="form-input" placeholder="Seán de Búrca"></div>
      <div class="form-group"><label class="form-label">Your role / title</label><input type="text" id="contactRole" class="form-input" placeholder="HR Manager, Recruiter…"></div>
      <div class="form-group"><label class="form-label">Work email *</label><input type="email" id="email" class="form-input" placeholder="sean@organisation.ie"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.8rem;">
        <div class="form-group"><label class="form-label">Password</label><input type="password" id="pass" class="form-input" placeholder="8+ characters"></div>
        <div class="form-group"><label class="form-label">Confirm</label><input type="password" id="pass2" class="form-input" placeholder="Repeat"></div>
      </div>
      <span class="form-error" id="passErr" style="display:none;margin-bottom:.8rem;"></span>
      <div style="display:flex;gap:.8rem;">
        <button class="btn btn-ghost" onclick="goStep(1)">← Back</button>
        <button class="btn btn-teal" id="regBtn" onclick="register()">Create account →</button>
      </div>
    </div>

    <p style="text-align:center;margin-top:1.2rem;font-size:.82rem;color:var(--gray);">Already registered? <a href="login.html" style="color:var(--teal);font-weight:600;text-decoration:none;">Sign in</a></p>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient('https://kpfshjarepmazrgzffot.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtwZnNoamFyZXBtYXpyZ3pmZm90Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUwNzQ0MjIsImV4cCI6MjA5MDY1MDQyMn0.yU-6ASii1duNXgGMs0ZWTkgTYXonVfqVOnEQr0J8FhU');
let currentStep=1;

window.goStep=n=>{ document.getElementById('step'+currentStep).classList.remove('active'); currentStep=n; document.getElementById('step'+n).classList.add('active'); ['sn1','sn2'].forEach((id,i)=>{ const el=document.getElementById(id); el.className='step-node '+(i+1<n?'done':i+1===n?'active':'pending'); el.textContent=i+1<n?'✓':String(i+1); }); document.getElementById('sl1').className='step-line'+(1<n?' done':''); };

window.nextStep=()=>{ if(!document.getElementById('orgName').value||!document.getElementById('orgType').value){alert('Please fill in required fields');return;} window.goStep(2); };

window.register=async()=>{ const p=document.getElementById('pass').value,p2=document.getElementById('pass2').value,err=document.getElementById('passErr'); if(p.length<8){err.textContent='Password must be 8+ characters';err.style.display='block';return;} if(p!==p2){err.textContent='Passwords do not match';err.style.display='block';return;} err.style.display='none'; const btn=document.getElementById('regBtn'); btn.textContent='Creating…';btn.disabled=true; const email=document.getElementById('email').value.trim(),orgName=document.getElementById('orgName').value.trim(),contactName=document.getElementById('contactName').value.trim(); const { data,error }=await sb.auth.signUp({email,password:p,options:{data:{full_name:contactName}}}); if(error){alert(error.message);btn.textContent='Create account →';btn.disabled=false;return;} if(data.user){ await sb.from('employers').upsert({id:data.user.id,email,org_name:orgName,contact_name:contactName,org_type:document.getElementById('orgType').value,county:document.getElementById('county').value}); } window.location.href='employer-dashboard.html'; };
</script>
</body>
</html>
